<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamMatch - Livestream Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #0f0f13;
      color: #fff;
      min-height: 100vh;
    }
    
    /* Loading */
    .loading-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 16px;
      color: #888;
    }
    
    /* Notification */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 14px 24px;
      border-radius: 8px;
      color: #fff;
      font-weight: 500;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    
    .notification.success { background-color: #2ed573; }
    .notification.error { background-color: #ff4757; }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #222;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    
    .logo-icon {
      font-size: 28px;
      color: #ff6b35;
    }
    
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .user-name {
      color: #aaa;
      font-size: 14px;
    }
    
    .logout-btn {
      padding: 8px 16px;
      background-color: transparent;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    
    .logout-btn:hover {
      background-color: #222;
    }
    
    /* Main */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    /* Landing */
    .landing {
      text-align: center;
    }
    
    .hero-section {
      margin-bottom: 60px;
    }
    
    .hero-title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }
    
    .hero-subtitle {
      font-size: 18px;
      color: #888;
      max-width: 500px;
      margin: 0 auto;
    }
    
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 700px;
      margin: 0 auto 40px;
    }
    
    .role-card {
      background-color: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 40px 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      position: relative;
    }
    
    .role-card:hover {
      border-color: #444;
      transform: translateY(-2px);
    }
    
    .role-icon {
      font-size: 40px;
      margin-bottom: 20px;
    }
    
    .role-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }
    
    .role-desc {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }
    
    .role-arrow {
      position: absolute;
      bottom: 30px;
      right: 30px;
      font-size: 24px;
      color: #555;
    }
    
    .admin-link {
      background: none;
      border: none;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      padding: 10px;
    }
    
    .admin-link:hover {
      color: #888;
    }
    
    /* Login */
    .login-container {
      max-width: 420px;
      margin: 0 auto;
    }
    
    .back-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 24px;
      padding: 0;
    }
    
    .back-btn:hover {
      color: #fff;
    }
    
    .login-card {
      background-color: #1a1a22;
      border-radius: 16px;
      padding: 40px;
      border: 2px solid #ff6b35;
      text-align: center;
    }
    
    .login-card.affiliate {
      border-color: #6c5ce7;
    }
    
    .login-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
      background-color: #fff5f0;
    }
    
    .login-card.affiliate .login-icon {
      background-color: #f0f0ff;
    }
    
    .login-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .login-subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 30px;
    }
    
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .login-input {
      padding: 14px 18px;
      background-color: #0f0f13;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    
    .login-input:focus {
      border-color: #555;
    }
    
    .login-btn {
      padding: 14px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #ff6b35;
    }
    
    .login-card.affiliate .login-btn {
      background-color: #6c5ce7;
    }
    
    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Dashboard */
    .dashboard {
      max-width: 900px;
      margin: 0 auto;
    }
    
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .dashboard-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .dashboard-subtitle {
      font-size: 14px;
      color: #888;
    }
    
    /* Legend */
    .legend-container {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
    }
    
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    /* Calendar Grid */
    .calendar-grid {
      background-color: #1a1a22;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .calendar-header {
      display: grid;
      grid-template-columns: 140px 1fr 1fr;
      padding: 16px 20px;
      background-color: #0f0f13;
      border-bottom: 1px solid #2a2a35;
    }
    
    .calendar-header-day,
    .calendar-header-slot {
      font-size: 13px;
      font-weight: 600;
      color: #888;
    }
    
    .calendar-header-slot {
      text-align: center;
    }
    
    .calendar-row {
      display: grid;
      grid-template-columns: 140px 1fr 1fr;
      padding: 12px 20px;
      border-bottom: 1px solid #2a2a35;
      align-items: center;
    }
    
    .calendar-row.weekend {
      background-color: #1a1a22;
    }
    
    .calendar-day-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .calendar-day-name {
      font-size: 12px;
      color: #666;
    }
    
    .calendar-day-num {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
    }
    
    .calendar-slot-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    
    .slot-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      font-size: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .slot-toggle.unavailable {
      background-color: #2a2a35;
    }
    
    .slot-toggle.available {
      background-color: #ff6b35;
    }
    
    .slot-toggle.booked {
      background-color: #2ed573;
      cursor: not-allowed;
    }
    
    .booked-by-label {
      font-size: 10px;
      color: #2ed573;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }
    
    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 8px;
    }
    
    .filter-tab {
      padding: 10px 18px;
      background-color: transparent;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      font-size: 13px;
      cursor: pointer;
    }
    
    .filter-tab.active {
      background-color: #6c5ce7;
      border-color: #6c5ce7;
      color: #fff;
    }
    
    /* Slots List */
    .slots-container {
      min-height: 300px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .empty-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    
    .empty-text {
      font-size: 14px;
      color: #888;
    }
    
    .slots-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .slot-card {
      background-color: #1a1a22;
      border-radius: 12px;
      padding: 24px;
      border-left: 4px solid #6c5ce7;
    }
    
    .seller-badge {
      font-size: 13px;
      color: #ff6b35;
      font-weight: 500;
      margin-bottom: 12px;
    }
    
    .slot-date {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    
    .slot-date-text {
      font-size: 18px;
      font-weight: 600;
    }
    
    .slot-time {
      font-size: 14px;
      color: #888;
    }
    
    .book-btn {
      padding: 10px 20px;
      background-color: #6c5ce7;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    
    .book-btn:hover {
      background-color: #5b4cdb;
    }
    
    .confirmed-badge {
      font-size: 13px;
      color: #2ed573;
      font-weight: 500;
      margin-top: 8px;
    }
    
    /* Admin */
    .admin-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .admin-title {
      font-size: 28px;
      font-weight: 700;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background-color: #1a1a22;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 13px;
      color: #888;
    }
    
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid #222;
      padding-bottom: 16px;
    }
    
    .admin-tab {
      padding: 10px 20px;
      background-color: transparent;
      border: none;
      border-radius: 8px;
      color: #888;
      font-size: 14px;
      cursor: pointer;
    }
    
    .admin-tab.active {
      background-color: #2a2a35;
      color: #fff;
    }
    
    .admin-content {
      min-height: 300px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      text-align: left;
      padding: 14px 16px;
      background-color: #1a1a22;
      color: #888;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 1px solid #2a2a35;
    }
    
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a22;
      font-size: 14px;
    }
    
    .cancel-btn {
      padding: 6px 12px;
      background-color: transparent;
      border: 1px solid #ff4757;
      border-radius: 6px;
      color: #ff4757;
      font-size: 12px;
      cursor: pointer;
    }
    
    .cancel-btn:hover {
      background-color: #ff4757;
      color: #fff;
    }
    
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }
    
    .user-section {
      background-color: #1a1a22;
      border-radius: 12px;
      padding: 24px;
    }
    
    .user-section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    .user-list {
      list-style: none;
    }
    
    .user-item {
      padding: 10px 0;
      border-bottom: 1px solid #2a2a35;
      font-size: 14px;
    }
    
    .no-users {
      color: #666;
      font-size: 14px;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div id="loading" class="loading-container">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading...</p>
    </div>
  </div>

  <script>
    // ============================================
    // CONFIGURATION - YOUR GOOGLE APPS SCRIPT URL
    // ============================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbylDPgJp5gPUj68V_hI-1BuhG-vcWIA8dNIVY6VUZ098iUm6oB3UCet8irDlHbpy63M/exec';
    // ============================================

    // State
    let state = {
      view: 'landing',
      currentUser: null,
      sellers: [],
      slots: [],
      bookings: [],
      affiliates: [],
      affiliateFilter: 'available',
      adminTab: 'bookings'
    };

    // Utility functions
    const generateId = () => Math.random().toString(36).substr(2, 9);

    const formatDate = (dateStr) => {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    };

    const formatTime = (time) => {
      const [hours, minutes] = time.split(':');
      const h = parseInt(hours);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return `${h12}:${minutes} ${ampm}`;
    };

    // API helper
    const apiCall = async (action, params = {}) => {
      try {
        const url = new URL(API_URL);
        url.searchParams.append('action', action);
        
        Object.entries(params).forEach(([key, value]) => {
          if (typeof value === 'object') {
            url.searchParams.append(key, JSON.stringify(value));
          } else {
            url.searchParams.append(key, value);
          }
        });
        
        const response = await fetch(url.toString());
        return await response.json();
      } catch (error) {
        console.error('API Error:', error);
        return null;
      }
    };

    // Notification
    const showNotification = (message, type = 'success') => {
      const existing = document.querySelector('.notification');
      if (existing) existing.remove();
      
      const notif = document.createElement('div');
      notif.className = `notification ${type}`;
      notif.textContent = message;
      document.body.appendChild(notif);
      
      setTimeout(() => notif.remove(), 3000);
    };

    // Load all data
    const loadAllData = async () => {
      try {
        const data = await apiCall('getAllData');
        if (data) {
          state.sellers = data.sellers || [];
          state.slots = data.slots || [];
          state.bookings = data.bookings || [];
          state.affiliates = data.affiliates || [];
        }
      } catch (err) {
        console.error('Error loading data:', err);
      }
      render();
    };

    // Generate February 2026 days
    const generateFebDays = () => {
      const days = [];
      for (let day = 1; day <= 28; day++) {
        const date = new Date(2026, 1, day);
        days.push({
          date: `2026-02-${String(day).padStart(2, '0')}`,
          dayName: date.toLocaleDateString('en-US', { weekday: 'short' }),
          dayNum: day
        });
      }
      return days;
    };

    // Event handlers
    const handleSellerLogin = async (name) => {
      let seller = state.sellers.find(s => s.name.toLowerCase() === name.toLowerCase());
      if (!seller) {
        seller = { id: generateId(), name, createdAt: new Date().toISOString() };
        state.sellers.push(seller);
        apiCall('addSeller', { data: seller });
      }
      state.currentUser = { ...seller, type: 'seller' };
      state.view = 'seller';
      render();
    };

    const handleAffiliateLogin = async (name) => {
      let affiliate = state.affiliates.find(a => a.name.toLowerCase() === name.toLowerCase());
      if (!affiliate) {
        affiliate = { id: generateId(), name, createdAt: new Date().toISOString() };
        state.affiliates.push(affiliate);
        apiCall('addAffiliate', { data: affiliate });
      }
      state.currentUser = { ...affiliate, type: 'affiliate' };
      state.view = 'affiliate';
      render();
    };

    const handleToggleSlot = async (date, time) => {
      const existingSlot = state.slots.find(s => 
        s.sellerId === state.currentUser.id && s.date === date && s.startTime === time
      );
      
      if (existingSlot) {
        const isBooked = state.bookings.some(b => b.slotId === existingSlot.id);
        if (isBooked) {
          showNotification('Cannot remove a booked slot', 'error');
          return;
        }
        state.slots = state.slots.filter(s => s.id !== existingSlot.id);
        apiCall('deleteSlot', { id: existingSlot.id });
        showNotification('Slot removed');
      } else {
        const newSlot = {
          id: generateId(),
          sellerId: state.currentUser.id,
          sellerName: state.currentUser.name,
          date,
          startTime: time,
          endTime: time === '20:00' ? '21:00' : '23:00',
          description: '',
          createdAt: new Date().toISOString()
        };
        state.slots.push(newSlot);
        apiCall('addSlot', { data: newSlot });
        showNotification('Slot added');
      }
      render();
    };

    const handleBookSlot = async (slotId) => {
      const existingBooking = state.bookings.find(b => b.slotId === slotId);
      if (existingBooking) {
        showNotification('This slot is already booked', 'error');
        return;
      }
      
      const slot = state.slots.find(s => s.id === slotId);
      const newBooking = {
        id: generateId(),
        slotId,
        sellerId: slot.sellerId,
        sellerName: slot.sellerName,
        affiliateId: state.currentUser.id,
        affiliateName: state.currentUser.name,
        date: slot.date,
        startTime: slot.startTime,
        endTime: slot.endTime,
        bookedAt: new Date().toISOString()
      };
      
      state.bookings.push(newBooking);
      apiCall('addBooking', { data: newBooking });
      showNotification('Slot booked successfully!');
      render();
    };

    const handleCancelBooking = async (bookingId) => {
      state.bookings = state.bookings.filter(b => b.id !== bookingId);
      apiCall('deleteBooking', { id: bookingId });
      showNotification('Booking cancelled');
      render();
    };

    const handleAdminDeleteSlot = async (slotId) => {
      const booking = state.bookings.find(b => b.slotId === slotId);
      if (booking) {
        state.bookings = state.bookings.filter(b => b.slotId !== slotId);
        apiCall('deleteBooking', { id: booking.id });
      }
      state.slots = state.slots.filter(s => s.id !== slotId);
      apiCall('deleteSlot', { id: slotId });
      showNotification('Slot deleted');
      render();
    };

    const handleLogout = () => {
      state.currentUser = null;
      state.view = 'landing';
      render();
    };

    const setView = (view) => {
      state.view = view;
      render();
    };

    // Render functions
    const render = () => {
      const app = document.getElementById('app');
      
      let headerHtml = '';
      if (state.view !== 'landing' && state.view !== 'seller-login' && state.view !== 'affiliate-login') {
        headerHtml = `
          <header class="header">
            <div class="logo" onclick="setView('landing'); state.currentUser = null; render();">
              <span class="logo-icon">◉</span>
              <span class="logo-text">StreamMatch</span>
            </div>
            ${state.currentUser ? `
              <div class="header-right">
                <span class="user-name">
                  ${state.currentUser.type === 'seller' ? '🏪' : '🎬'} ${state.currentUser.name}
                </span>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
              </div>
            ` : ''}
          </header>
        `;
      } else if (state.view === 'landing') {
        headerHtml = `
          <header class="header">
            <div class="logo">
              <span class="logo-icon">◉</span>
              <span class="logo-text">StreamMatch</span>
            </div>
          </header>
        `;
      }
      
      let contentHtml = '';
      
      switch (state.view) {
        case 'landing':
          contentHtml = renderLanding();
          break;
        case 'seller-login':
          contentHtml = renderLogin('seller');
          break;
        case 'affiliate-login':
          contentHtml = renderLogin('affiliate');
          break;
        case 'seller':
          contentHtml = renderSellerDashboard();
          break;
        case 'affiliate':
          contentHtml = renderAffiliateDashboard();
          break;
        case 'admin':
          contentHtml = renderAdminDashboard();
          break;
      }
      
      app.innerHTML = `
        ${headerHtml}
        <main class="main">
          ${contentHtml}
        </main>
      `;
    };

    const renderLanding = () => `
      <div class="landing">
        <div class="hero-section">
          <h1 class="hero-title">Connect Sellers with Livestreamers</h1>
          <p class="hero-subtitle">The easiest way to schedule and manage livestream collaborations</p>
        </div>
        
        <div class="card-grid">
          <div class="role-card" onclick="setView('seller-login')">
            <div class="role-icon">🏪</div>
            <h2 class="role-title">I'm a Seller</h2>
            <p class="role-desc">Set your available time slots and let livestreamers find you</p>
            <div class="role-arrow">→</div>
          </div>
          
          <div class="role-card" onclick="setView('affiliate-login')">
            <div class="role-icon">🎬</div>
            <h2 class="role-title">I'm a Livestreamer</h2>
            <p class="role-desc">Browse available sellers and book slots that fit your schedule</p>
            <div class="role-arrow">→</div>
          </div>
        </div>
        
        <button class="admin-link" onclick="setView('admin')">Admin Dashboard →</button>
      </div>
    `;

    const renderLogin = (type) => {
      const isSeller = type === 'seller';
      return `
        <div class="login-container">
          <button class="back-btn" onclick="setView('landing')">← Back</button>
          
          <div class="login-card ${isSeller ? '' : 'affiliate'}">
            <div class="login-icon">${isSeller ? '🏪' : '🎬'}</div>
            <h2 class="login-title">${isSeller ? 'Seller Login' : 'Livestreamer Login'}</h2>
            <p class="login-subtitle">Enter your name to continue. New users will be registered automatically.</p>
            
            <div class="login-form">
              <input 
                type="text" 
                id="login-name" 
                class="login-input" 
                placeholder="${isSeller ? 'Enter your shop name' : 'Enter your channel name'}"
                onkeydown="if(event.key === 'Enter') document.getElementById('login-btn').click()"
              >
              <button 
                id="login-btn"
                class="login-btn" 
                onclick="${isSeller ? 'handleSellerLogin' : 'handleAffiliateLogin'}(document.getElementById('login-name').value)"
              >
                Continue
              </button>
            </div>
          </div>
        </div>
      `;
    };

    const renderSellerDashboard = () => {
      const febDays = generateFebDays();
      const timeSlots = ['20:00', '22:00'];
      const mySlots = state.slots.filter(s => s.sellerId === state.currentUser.id);
      
      const getSlotForDateTime = (date, time) => {
        return mySlots.find(s => s.date === date && s.startTime === time);
      };
      
      const getSlotStatus = (slotId) => {
        const booking = state.bookings.find(b => b.slotId === slotId);
        return booking ? { booked: true, affiliate: booking.affiliateName } : { booked: false };
      };
      
      let rowsHtml = febDays.map(day => {
        const isWeekend = ['Sat', 'Sun'].includes(day.dayName);
        
        const slotsHtml = timeSlots.map(time => {
          const slot = getSlotForDateTime(day.date, time);
          const status = slot ? getSlotStatus(slot.id) : null;
          const isBooked = status?.booked;
          const isAvailable = slot && !isBooked;
          
          let btnClass = 'slot-toggle unavailable';
          let btnText = '○';
          if (isBooked) {
            btnClass = 'slot-toggle booked';
            btnText = '✓';
          } else if (isAvailable) {
            btnClass = 'slot-toggle available';
            btnText = '●';
          }
          
          return `
            <div class="calendar-slot-cell">
              <button 
                class="${btnClass}" 
                onclick="handleToggleSlot('${day.date}', '${time}')"
                ${isBooked ? 'disabled' : ''}
              >
                ${btnText}
              </button>
              ${isBooked ? `<span class="booked-by-label">${status.affiliate}</span>` : ''}
            </div>
          `;
        }).join('');
        
        return `
          <div class="calendar-row ${isWeekend ? 'weekend' : ''}">
            <div class="calendar-day-cell">
              <span class="calendar-day-name">${day.dayName}</span>
              <span class="calendar-day-num">Feb ${day.dayNum}</span>
            </div>
            ${slotsHtml}
          </div>
        `;
      }).join('');
      
      return `
        <div class="dashboard">
          <div class="dashboard-header">
            <div>
              <h1 class="dashboard-title">Your Livestream Slots</h1>
              <p class="dashboard-subtitle">Toggle your availability for February 2026</p>
            </div>
            <div class="legend-container">
              <div class="legend-item">
                <div class="legend-dot" style="background-color: #2a2a35;"></div>
                <span>Unavailable</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot" style="background-color: #ff6b35;"></div>
                <span>Available</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot" style="background-color: #2ed573;"></div>
                <span>Booked</span>
              </div>
            </div>
          </div>
          
          <div class="calendar-grid">
            <div class="calendar-header">
              <div class="calendar-header-day">Date</div>
              <div class="calendar-header-slot">8 PM</div>
              <div class="calendar-header-slot">10 PM</div>
            </div>
            ${rowsHtml}
          </div>
        </div>
      `;
    };

    const renderAffiliateDashboard = () => {
      const isSlotBooked = (slotId) => state.bookings.some(b => b.slotId === slotId);
      const availableSlots = state.slots.filter(s => !isSlotBooked(s.id));
      const myBookings = state.bookings.filter(b => b.affiliateId === state.currentUser.id);
      
      let contentHtml = '';
      
      if (state.affiliateFilter === 'available') {
        if (availableSlots.length === 0) {
          contentHtml = `
            <div class="empty-state">
              <div class="empty-icon">🔍</div>
              <h3 class="empty-title">No available slots</h3>
              <p class="empty-text">Check back later for new opportunities</p>
            </div>
          `;
        } else {
          contentHtml = `
            <div class="slots-list">
              ${availableSlots.map(slot => `
                <div class="slot-card">
                  <div class="seller-badge">🏪 ${slot.sellerName}</div>
                  <div class="slot-date">
                    <span class="slot-date-text">${formatDate(slot.date)}</span>
                    <span class="slot-time">${formatTime(slot.startTime)} - ${formatTime(slot.endTime)}</span>
                  </div>
                  <button class="book-btn" onclick="handleBookSlot('${slot.id}')">Book This Slot</button>
                </div>
              `).join('')}
            </div>
          `;
        }
      } else {
        if (myBookings.length === 0) {
          contentHtml = `
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <h3 class="empty-title">No bookings yet</h3>
              <p class="empty-text">Browse available slots to make your first booking</p>
            </div>
          `;
        } else {
          contentHtml = `
            <div class="slots-list">
              ${myBookings.map(booking => `
                <div class="slot-card" style="border-left-color: #2ed573;">
                  <div class="seller-badge">🏪 ${booking.sellerName}</div>
                  <div class="slot-date">
                    <span class="slot-date-text">${formatDate(booking.date)}</span>
                    <span class="slot-time">${formatTime(booking.startTime)} - ${formatTime(booking.endTime)}</span>
                  </div>
                  <div class="confirmed-badge">✓ Confirmed</div>
                </div>
              `).join('')}
            </div>
          `;
        }
      }
      
      return `
        <div class="dashboard">
          <div class="dashboard-header">
            <div>
              <h1 class="dashboard-title">Browse Livestream Slots</h1>
              <p class="dashboard-subtitle">Find and book available slots from sellers</p>
            </div>
            <div class="filter-tabs">
              <button 
                class="filter-tab ${state.affiliateFilter === 'available' ? 'active' : ''}"
                onclick="state.affiliateFilter = 'available'; render();"
              >
                Available (${availableSlots.length})
              </button>
              <button 
                class="filter-tab ${state.affiliateFilter === 'my-bookings' ? 'active' : ''}"
                onclick="state.affiliateFilter = 'my-bookings'; render();"
              >
                My Bookings (${myBookings.length})
              </button>
            </div>
          </div>
          
          <div class="slots-container">
            ${contentHtml}
          </div>
        </div>
      `;
    };

    const renderAdminDashboard = () => {
      let tabContentHtml = '';
      
      if (state.adminTab === 'bookings') {
        if (state.bookings.length === 0) {
          tabContentHtml = `<div class="empty-state"><p>No bookings yet</p></div>`;
        } else {
          tabContentHtml = `
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Seller</th>
                  <th>Livestreamer</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${state.bookings.map(b => `
                  <tr>
                    <td>${formatDate(b.date)}</td>
                    <td>${formatTime(b.startTime)} - ${formatTime(b.endTime)}</td>
                    <td>${b.sellerName}</td>
                    <td>${b.affiliateName}</td>
                    <td><button class="cancel-btn" onclick="handleCancelBooking('${b.id}')">Cancel</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        }
      } else if (state.adminTab === 'slots') {
        if (state.slots.length === 0) {
          tabContentHtml = `<div class="empty-state"><p>No slots created yet</p></div>`;
        } else {
          tabContentHtml = `
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Seller</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${state.slots.map(slot => {
                  const booking = state.bookings.find(b => b.slotId === slot.id);
                  return `
                    <tr>
                      <td>${formatDate(slot.date)}</td>
                      <td>${formatTime(slot.startTime)} - ${formatTime(slot.endTime)}</td>
                      <td>${slot.sellerName}</td>
                      <td>${booking ? `<span style="color: #2ed573;">Booked by ${booking.affiliateName}</span>` : `<span style="color: #ffa502;">Available</span>`}</td>
                      <td><button class="cancel-btn" onclick="handleAdminDeleteSlot('${slot.id}')">Delete</button></td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          `;
        }
      } else {
        tabContentHtml = `
          <div class="users-grid">
            <div class="user-section">
              <h3 class="user-section-title">🏪 Sellers (${state.sellers.length})</h3>
              ${state.sellers.length === 0 ? '<p class="no-users">No sellers registered</p>' : `
                <ul class="user-list">
                  ${state.sellers.map(s => `<li class="user-item">${s.name}</li>`).join('')}
                </ul>
              `}
            </div>
            <div class="user-section">
              <h3 class="user-section-title">🎬 Livestreamers (${state.affiliates.length})</h3>
              ${state.affiliates.length === 0 ? '<p class="no-users">No livestreamers registered</p>' : `
                <ul class="user-list">
                  ${state.affiliates.map(a => `<li class="user-item">${a.name}</li>`).join('')}
                </ul>
              `}
            </div>
          </div>
        `;
      }
      
      return `
        <div class="dashboard">
          <div class="admin-header">
            <button class="back-btn" onclick="setView('landing')">← Back</button>
            <h1 class="admin-title">Admin Dashboard</h1>
          </div>
          
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value">${state.sellers.length}</div>
              <div class="stat-label">Sellers</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${state.affiliates.length}</div>
              <div class="stat-label">Livestreamers</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${state.slots.length}</div>
              <div class="stat-label">Total Slots</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${state.bookings.length}</div>
              <div class="stat-label">Bookings</div>
            </div>
          </div>
          
          <div class="admin-tabs">
            <button class="admin-tab ${state.adminTab === 'bookings' ? 'active' : ''}" onclick="state.adminTab = 'bookings'; render();">Confirmed Bookings</button>
            <button class="admin-tab ${state.adminTab === 'slots' ? 'active' : ''}" onclick="state.adminTab = 'slots'; render();">All Slots</button>
            <button class="admin-tab ${state.adminTab === 'users' ? 'active' : ''}" onclick="state.adminTab = 'users'; render();">Users</button>
          </div>
          
          <div class="admin-content">
            ${tabContentHtml}
          </div>
        </div>
      `;
    };

    // Initialize
    loadAllData();
  </script>
</body>
</html>
