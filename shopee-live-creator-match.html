    };

    // ========================
    // RENDER: Creator Dashboard
    // ========================

    const renderCreatorDashboard = () => {
      if (state.showCreatorApplyForm) return renderCreatorApplyForm(state.showCreatorApplyForm);

      // Available brands = approved brand applications with remaining slots (already filtered by backend to 3-month window)
      const approvedBrandApps = state.brandApplications.filter(a => a.status === 'approved');
      const availableBrands = approvedBrandApps.filter(app => {
        return countTakenSlots(app.id) < app.streamCount;
      }).sort((a, b) => (a.month || '').localeCompare(b.month || ''));

      // Get unique categories for filter tabs
      const categories = [...new Set(availableBrands.map(app => app.sellerType || 'Uncategorized'))].sort();

      // Apply category filter
      const filteredBrands = state.creatorCategoryFilter === 'all'
        ? availableBrands
        : availableBrands.filter(app => (app.sellerType || 'Uncategorized') === state.creatorCategoryFilter);

      // My applications (already filtered by backend to 3-month window)
      const myApps = state.creatorApplications.filter(a => a.creatorId === state.currentUser.id);

      let contentHtml = '';

      if (state.creatorTab === 'available') {
        if (availableBrands.length === 0) {
          contentHtml = `
            <div class="empty-state">
              <div class="empty-icon">🔍</div>
              <h3 class="empty-title">No available brands</h3>
              <p class="empty-text">Check back later for approved brand opportunities</p>
            </div>
          `;
        } else {
          const categoryTabsHtml = `
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;">
              <button class="filter-tab ${state.creatorCategoryFilter === 'all' ? 'active' : ''}" style="font-size:12px;padding:6px 14px;"
                onclick="state.creatorCategoryFilter = 'all'; render();">
                All (${availableBrands.length})
              </button>
              ${categories.map(cat => {
                const count = availableBrands.filter(app => (app.sellerType || 'Uncategorized') === cat).length;
                return `<button class="filter-tab ${state.creatorCategoryFilter === cat ? 'active' : ''}" style="font-size:12px;padding:6px 14px;"
                  onclick="state.creatorCategoryFilter = '${cat.replace(/'/g, "\\'")}'; render();">
                  ${cat} (${count})
                </button>`;
              }).join('')}
            </div>
          `;
          contentHtml = categoryTabsHtml + (filteredBrands.length === 0
            ? `<div class="empty-state"><p style="color:#888;">No brands in this category</p></div>`
            : filteredBrands.map(app => {
            const remaining = app.streamCount - countTakenSlots(app.id);
            const alreadyApplied = state.creatorApplications.some(
              ca => ca.brandApplicationId === app.id && ca.creatorId === state.currentUser.id && ca.status !== 'rejected'
            );
            return `
              <div class="app-card">
                <div class="app-card-header">
                  <div class="app-card-title">🏪 ${app.shopName}</div>
                  <span style="font-size:13px;color:#27ae60;font-weight:600;">${remaining} slot${remaining !== 1 ? 's' : ''} left</span>
                </div>
                <div style="display:inline-block;padding:4px 10px;background:#fff1ed;border-radius:6px;font-size:12px;color:#EE4D2D;font-weight:500;margin-bottom:12px;border:1px solid #FCDDD4;">${app.sellerType || 'Uncategorized'}</div>
                <div class="app-card-meta">
                  <div class="app-card-meta-item">Month: <strong>${formatMonth(app.month)}</strong></div>
                  <div class="app-card-meta-item">AMS: <strong>${app.amsCommission}%</strong></div>
                  ${String(app.sellerSiteRequired) === 'true' ? '<div class="app-card-meta-item" style="color:#e67e22;">📍 Seller site required</div>' : ''}
                </div>
                ${app.livestreamBrief ? `<p style="margin-top:8px;"><a href="${app.livestreamBrief}" target="_blank" style="font-size:13px;color:#6c5ce7;text-decoration:underline;">📄 View Livestream Brief</a></p>` : ''}
                <div style="margin-top:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                  ${alreadyApplied
                    ? `<span style="font-size:13px;color:#6c5ce7;font-weight:500;">✓ Already applied</span>
                       <button class="btn-secondary" style="font-size:13px;padding:8px 16px;" onclick="startCreatorApplication('${app.id}')">Apply Again</button>`
                    : `<button class="btn-primary creator-accent" onclick="startCreatorApplication('${app.id}')">Apply for This Brand</button>`
                  }
                </div>
              </div>
            `;
          }).join(''));
        }
      } else if (state.creatorTab === 'pending-confirmation') {
        // Pending My Confirmation tab
        const pendingConfirm = myApps.filter(a => a.status === 'approved');
        if (pendingConfirm.length === 0) {
          contentHtml = `
            <div class="empty-state">
              <div class="empty-icon">✅</div>
              <h3 class="empty-title">No pending confirmations</h3>
              <p class="empty-text">You have no applications awaiting your confirmation</p>
            </div>
          `;
        } else {
          contentHtml = pendingConfirm.map(app => {
            const slots = getTimeslots(app);
            const brandApp = state.brandApplications.find(ba => ba.id === app.brandApplicationId);
            return `
              <div class="app-card creator-app">
                <div class="app-card-header">
                  <div class="app-card-title">🏪 ${app.brandName || app.shopName}</div>
                  <span class="status-badge status-approved">Awaiting Confirmation</span>
                </div>
                <div style="margin-top:8px;">
                  ${slots.length > 0 ? slots.map(s => `
                    <span style="display:inline-block;padding:4px 10px;background:#f0f0ff;border-radius:6px;font-size:12px;color:#6c5ce7;margin:2px;">📅 ${formatDate(s.date)} ${formatTime(s.startTime || s.time)}${s.endTime ? ' – ' + formatTime(s.endTime) : ''}</span>
                  `).join('') : ''}
                </div>
                ${brandApp ? `
                  <div class="app-card-meta" style="margin-top:8px;">
                    <div class="app-card-meta-item">AMS: <strong>${brandApp.amsCommission}%</strong></div>
                    <div class="app-card-meta-item">Category: <strong>${brandApp.sellerType || '—'}</strong></div>
                  </div>
                ` : ''}
                <div style="margin-top:12px;padding:12px 16px;background:#e8f5e9;border-radius:8px;">
                  <p style="font-size:13px;color:#27ae60;margin-bottom:8px;">Internal team approved your application. Please confirm your slot.</p>
                  <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn-primary" style="background-color:#27ae60;" onclick="handleCreatorConfirmSlot('${app.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;cursor:not-allowed;background-color:#27ae60;"' : ''}>${state.confirmingAppId === app.id ? 'Confirming...' : 'Confirm Slot'}</button>
                    <button class="btn-secondary" style="color:#c62828;border-color:#c62828;" onclick="handleCreatorRejectSlot('${app.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>Reject Slot</button>
                  </div>
                </div>
              </div>
            `;
          }).join('');
        }
      } else {
        // My Applications tab — list/calendar toggle
        const creatorAppsToggle = `
          <div style="display:flex;gap:8px;margin-bottom:16px;">
            <button class="filter-tab ${state.creatorAppsView === 'list' ? 'active' : ''}"
              onclick="state.creatorAppsView = 'list'; render();"
              style="padding:6px 16px;font-size:12px;${state.creatorAppsView === 'list' ? 'background-color:#EE4D2D;border-color:#EE4D2D;' : ''}">
              List View
            </button>
            <button class="filter-tab ${state.creatorAppsView === 'calendar' ? 'active' : ''}"
              onclick="state.creatorAppsView = 'calendar'; render();"
              style="padding:6px 16px;font-size:12px;${state.creatorAppsView === 'calendar' ? 'background-color:#EE4D2D;border-color:#EE4D2D;' : ''}">
              Calendar View
            </button>
          </div>
        `;

        if (myApps.length === 0) {
          contentHtml = creatorAppsToggle + `
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <h3 class="empty-title">No applications yet</h3>
              <p class="empty-text">Browse available brands to apply</p>
            </div>
          `;
        } else if (state.creatorAppsView === 'calendar') {
          // Calendar view
          const year = state.calendarYear;
          const month = state.calendarMonth;
          const firstDay = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const monthName = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

          const calendarEvents = [];
          myApps.forEach(app => {
            getTimeslots(app).forEach(slot => {
              calendarEvents.push({
                date: slot.date,
                startTime: slot.startTime || slot.time,
                endTime: slot.endTime || '',
                brandName: app.brandName || app.shopName,
                status: app.status
              });
            });
          });

          const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          let cells = '';
          for (let i = 0; i < firstDay; i++) cells += '<div class="calendar-day empty"></div>';
          for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const daySlots = calendarEvents.filter(e => e.date === dateStr);
            const eventsHtml = daySlots.map(e =>
              `<div class="calendar-event ${e.status}">${e.brandName}${e.startTime ? ' ' + formatTime(e.startTime) : ''}${e.endTime ? '–' + formatTime(e.endTime) : ''}</div>`
            ).join('');
            cells += `<div class="calendar-day"><div class="calendar-day-num">${day}</div>${eventsHtml}</div>`;
          }

          contentHtml = creatorAppsToggle + `
            <div style="margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;font-size:11px;">
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#e67e22;margin-right:4px;"></span>Pending</span>
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#1976d2;margin-right:4px;"></span>Approved</span>
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#27ae60;margin-right:4px;"></span>Confirmed</span>
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#c62828;margin-right:4px;"></span>Rejected</span>
            </div>
            <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
              <button class="btn-secondary" style="padding:8px 16px;" onclick="
                state.calendarMonth--;
                if(state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear--; }
                render();
              ">← Prev</button>
              <h3 style="font-size:18px;">${monthName}</h3>
              <button class="btn-secondary" style="padding:8px 16px;" onclick="
                state.calendarMonth++;
                if(state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear++; }
                render();
              ">Next →</button>
            </div>
            <div class="calendar-month">
              ${dayHeaders.map(d => `<div class="calendar-day-header">${d}</div>`).join('')}
              ${cells}
            </div>
          `;
        } else {
          // List view (default)
          contentHtml = creatorAppsToggle + myApps.map(app => {
            const slots = getTimeslots(app);
            const brandApp = state.brandApplications.find(ba => ba.id === app.brandApplicationId);
            return `
              <div class="app-card creator-app">
                <div class="app-card-header">
                  <div class="app-card-title">🏪 ${app.brandName || app.shopName}</div>
                  <span class="status-badge status-${app.status}">${app.status}</span>
                </div>
                <div style="margin-top:8px;">
                  ${slots.length > 0 ? slots.map(s => `
                    <span style="display:inline-block;padding:4px 10px;background:#f0f0ff;border-radius:6px;font-size:12px;color:#6c5ce7;margin:2px;">📅 ${formatDate(s.date)} ${formatTime(s.startTime || s.time)}${s.endTime ? ' – ' + formatTime(s.endTime) : ''}</span>
                  `).join('') : `
                    <div class="app-card-meta">
                      <div class="app-card-meta-item">Date: <strong>${formatDate(app.streamDate)}</strong></div>
                      <div class="app-card-meta-item">Time: <strong>${app.streamTime || '—'}</strong></div>
                    </div>
                  `}
                </div>
                ${brandApp ? `
                  <div class="app-card-meta" style="margin-top:8px;">
                    <div class="app-card-meta-item">AMS: <strong>${brandApp.amsCommission}%</strong></div>
                    <div class="app-card-meta-item">Category: <strong>${brandApp.sellerType || '—'}</strong></div>
                    <div class="app-card-meta-item">Month: <strong>${formatMonth(brandApp.month)}</strong></div>
                  </div>
                  ${brandApp.livestreamBrief ? `<p style="margin-top:8px;"><a href="${brandApp.livestreamBrief}" target="_blank" style="font-size:13px;color:#6c5ce7;text-decoration:underline;">📄 View Livestream Brief</a></p>` : ''}
                ` : ''}
              </div>
            `;
          }).join('');
        }
      }

      return `
        <div class="dashboard">
          <div class="dashboard-header">
            <div>
              <h1 class="dashboard-title">Creator Dashboard</h1>
              <p class="dashboard-subtitle">Browse brands and apply for livestream slots</p>
            </div>
          </div>
          <div style="padding:12px 16px;background:#e3f2fd;border-radius:8px;margin-bottom:16px;font-size:13px;color:#1565c0;">
            📬 To receive Telegram notifications when your applications are approved, send <strong>/start</strong> to
            <a href="https://t.me/${TELEGRAM_BOT_USERNAME}" target="_blank" style="color:#1565c0;font-weight:600;">@${TELEGRAM_BOT_USERNAME}</a>
          </div>
          <div class="filter-tabs">
            <button class="filter-tab ${state.creatorTab === 'available' ? 'active' : ''}"
              onclick="state.creatorTab = 'available'; render();">
              Available Brands (${availableBrands.length})
            </button>
            <button class="filter-tab ${state.creatorTab === 'pending-confirmation' ? 'active' : ''}"
              onclick="state.creatorTab = 'pending-confirmation'; render();">
              Pending My Confirmation (${myApps.filter(a => a.status === 'approved').length})
            </button>
            <button class="filter-tab ${state.creatorTab === 'my-applications' ? 'active' : ''}"
              onclick="state.creatorTab = 'my-applications'; render();">
              My Applications (${myApps.length})
            </button>
          </div>
          ${contentHtml}
        </div>
      `;
    };

    // ========================
    // RENDER: Creator Apply Form

    const renderCreatorApplyForm = (brandAppId) => {
      const brandApp = state.brandApplications.find(a => a.id === brandAppId);
      if (!brandApp) {
        state.showCreatorApplyForm = null;
        render();

      // Get already-taken date/times for this brand (by other creators)
      const takenList = getTakenTimeslotObjects(brandAppId);

      // Get creator's own confirmed timeslots across all brands
      const myConfirmedList = getCreatorConfirmedTimeslots().map(s => ({ date: s.date, time: s.startTime }));

      // Get creator's previous applications for this specific brand
      const myPrevApps = getCreatorAppsForBrand(brandAppId);
      const myPrevSlots = [];

            <div style="display:inline-block;padding:4px 10px;background:#f0f0f0;border-radius:6px;font-size:12px;color:#555;font-weight:500;margin-bottom:8px;">${brandApp.sellerType || 'Uncategorized'}</div>
            <div class="app-card-meta">

                    📅 ${formatDate(s.date)} ${formatTime(s.startTime || s.time)}${s.endTime ? ' – ' + formatTime(s.endTime) : ''} <span style="text-transform:uppercase;font-weight:600;font-size:10px;">${s.status}</span>
                  </span>
                `).join('')}
              </div>
            </div>
          ` : ''}

          <div class="form-container" id="creator-app-form">
            <h2 class="form-title">Apply for This Brand</h2>
            <p class="form-subtitle">Select your preferred streaming timeslots and provide your details</p>

            <div class="form-section">
              <div class="form-section-title creator-accent">Stream Schedule</div>
              <p style="font-size:13px;color:#888;margin-bottom:16px;">Add one or more preferred timeslots. Dates must be within <strong>${formatMonth(brandApp.month)}</strong>. Slots already taken by another creator or confirmed in your own schedule are blocked.</p>
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label">Stream Date</label>
                  <input type="date" id="f-stream-date" class="form-input"
                    min="${brandApp.month}-01"
                    max="${brandApp.month}-${new Date(parseInt(brandApp.month.split('-')[0]), parseInt(brandApp.month.split('-')[1]), 0).getDate()}">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Stream Start Time</label>
                  <input type="time" id="f-stream-start-time" class="form-input">
                </div>
                <div class="form-group">
                  <label class="form-label">Stream End Time</label>
                  <input type="time" id="f-stream-end-time" class="form-input">
                </div>
              </div>
              <button type="button" class="btn-secondary" style="margin-top:8px;" onclick="addTimeslot('${brandAppId}')">+ Add Timeslot</button>

              ${selectedTimeslots.length > 0 ? `
                <div style="margin-top:16px;">
                  <label class="form-label" style="margin-bottom:8px;">Selected Timeslots (${selectedTimeslots.length})</label>
                  ${selectedTimeslots.map((slot, i) => `
                    <div style="display:flex;align-items:center;gap:12px;padding:10px 16px;background:#f0f0ff;border-radius:8px;margin-bottom:6px;border:1px solid #e0e0ff;">
                      <span style="flex:1;font-size:14px;color:#333;">📅 ${formatDate(slot.date)} — ${formatTime(slot.startTime)} to ${formatTime(slot.endTime)}</span>
                      <button type="button" onclick="removeTimeslot(${i})" style="background:none;border:none;color:#ff4757;font-size:18px;cursor:pointer;padding:0 4px;">✕</button>
                    </div>
                  `).join('')}
                </div>
              ` : `
                <div style="margin-top:16px;padding:20px;text-align:center;background:#f9f9f9;border-radius:8px;border:1px dashed #ddd;">
                  <p style="font-size:13px;color:#999;">No timeslots added yet. Select a date and time, then click "+ Add Timeslot".</p>
                </div>
              `}

              ${takenList.length > 0 ? `
                <div style="margin-top:16px;padding:12px 16px;background:#fff3e0;border-radius:8px;">
                  <p style="font-size:12px;color:#e67e22;font-weight:600;margin-bottom:6px;">Unavailable slots (already taken):</p>
                  ${takenList.map(s => `<span style="display:inline-block;padding:3px 8px;background:#ffe0b2;border-radius:4px;font-size:11px;color:#e67e22;margin:2px;">${formatDate(s.date)} ${formatTime(s.startTime)}${s.endTime ? ' – ' + formatTime(s.endTime) : ''}</span>`).join('')}
                </div>
              ` : ''}
            </div>

            <div class="form-section">
              <div class="form-section-title creator-accent">Your Details</div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Affiliate Username <span class="required">*</span></label>
                  <input type="text" id="f-affiliate-user" class="form-input" value="${state.currentUser.name}" readonly style="opacity:0.7;cursor:not-allowed;background:#f0f0f0;">
                </div>
                <div class="form-group">
                  <label class="form-label">Phone Number <span class="required">*</span></label>
                  ${(() => {
                    const p = parseStoredPhone(state.currentUser.phone);
                    return `
                      <div style="display:flex;gap:8px;">
                        <select id="f-phone-code" class="form-input" style="width:130px;min-width:130px;flex-shrink:0;opacity:0.7;cursor:not-allowed;background:#f0f0f0;" disabled>
                          ${countryCodes.map(cc => `<option value="${cc.code}" ${cc.code === p.code ? 'selected' : ''}>${cc.label}</option>`).join('')}
                        </select>
                        <input type="tel" id="f-phone" class="form-input" value="${p.number}" readonly style="flex:1;opacity:0.7;cursor:not-allowed;background:#f0f0f0;">
                      </div>
                      <div style="font-size:11px;color:#999;margin-top:4px;">If your phone number is incorrect, please update it in your <span style="color:#6c5ce7;cursor:pointer;text-decoration:underline;" onclick="handleViewProfile()">profile</span>.</div>
                    `;
                  })()}
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Telegram Username <span class="required">*</span></label>
                  <input type="text" id="f-telegram" class="form-input" placeholder="@username">
                </div>
                <div class="form-group" style="grid-column: span 1;">
                </div>
              </div>
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label">Shipping Address <span class="required">*</span></label>
                  <textarea id="f-address" class="form-textarea" placeholder="Full shipping address for product samples" style="min-height:80px;"></textarea>
                </div>
              </div>
              ${String(brandApp.sellerSiteRequired) === 'true' ? `
                <div class="form-checkbox-row" onclick="this.querySelector('input').click()">
                  <input type="checkbox" id="f-travel" onclick="event.stopPropagation()">
                  <div>
                    <div class="form-checkbox-label">I am willing to travel to the seller's site for this stream</div>
                    <div class="form-hint">This brand requires streaming from their location</div>
                  </div>
                </div>
              ` : '<input type="hidden" id="f-travel">'}
            </div>

            <div class="form-actions">
              <button class="btn-primary creator-accent" onclick="handleSubmitCreatorApplication('${brandAppId}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>${state.isSubmitting ? 'Submitting...' : 'Submit Application'}</button>
              <button class="btn-secondary" onclick="state.showCreatorApplyForm = null; state.creatorFormTimeslots = []; render();" ${state.isSubmitting ? 'disabled' : ''}>Cancel</button>
            </div>
          </div>
        </div>
      `;
    };

    // ========================
    // RENDER: Brand Profile
    // ========================

    const renderBrandProfile = () => {
      const user = state.currentUser;
      if (!user) return '';

      if (state.profileEditMode) {
        return `
          <div class="dashboard">
            <button class="back-btn" onclick="state.profileEditMode = false; render();">← Back to Profile</button>
            <div class="form-container">
              <h2 class="form-title">Edit Profile</h2>
              <p class="form-subtitle">Update your shop information</p>
              <div class="form-section">
                <div class="form-row single">
                  <div class="form-group">
                    <label class="form-label">Shop ID</label>
                    <input type="text" class="form-input" value="${user.shopId}" readonly style="opacity:0.7;cursor:not-allowed;background:#f0f0f0;">
                    <div class="form-hint">Shop ID cannot be changed</div>
                  </div>
                </div>
                <div class="form-row single">
                  <div class="form-group">
                    <label class="form-label">Shop Name <span class="required">*</span></label>
                    <input type="text" id="profile-shop-name" class="form-input" value="${user.shopName || user.name}">
                  </div>
                </div>
              </div>
              <div class="form-actions">
                <button class="btn-primary" onclick="handleSaveBrandProfile()">Save Changes</button>
                <button class="btn-secondary" onclick="state.profileEditMode = false; render();">Cancel</button>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="dashboard">
          <button class="back-btn" onclick="state.view = 'brand'; render();">← Back to Dashboard</button>
          <div class="form-container">
            <h2 class="form-title">My Profile</h2>
            <p class="form-subtitle">Your seller account information</p>
            <div class="form-section">
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label" style="color:#999;">Shop ID</label>
                  <div style="padding:12px 16px;background:#f9f9f9;border-radius:8px;font-size:14px;color:#333;">${user.shopId}</div>
                </div>
              </div>
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label" style="color:#999;">Shop Name</label>
                  <div style="padding:12px 16px;background:#f9f9f9;border-radius:8px;font-size:14px;color:#333;">${user.shopName || user.name}</div>
                </div>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn-primary" onclick="state.profileEditMode = true; render();">Edit Profile</button>
            </div>
          </div>
        </div>
      `;
    };

    const handleSaveBrandProfile = async () => {
      const newName = document.getElementById('profile-shop-name').value.trim();
      if (!newName) {
        showNotification('Shop Name cannot be empty', 'error');
        return;
      }

      state.isLoading = true;
      render();
      const result = await apiCall('updateSellerProfile', { shopId: state.currentUser.shopId, data: { name: newName } });
      if (!result || !result.success) {
        state.isLoading = false;
        showNotification(result ? result.error : 'Failed to update profile', 'error');
        render();
        return;
      }

      // Update local state
      state.currentUser.name = newName;
      state.currentUser.shopName = newName;
      const localBrand = state.brands.find(b => b.id === state.currentUser.shopId);
      if (localBrand) localBrand.name = newName;

      // Reload all data to reflect cascading changes
      state.isLoading = false;
      await loadAllData();
      state.profileEditMode = false;
      showNotification(`Profile updated! ${result.updatedCount} related record(s) updated.`);
      render();
    };

    // ========================
    // RENDER: Creator Profile
    // ========================

    const renderCreatorProfile = () => {
      const user = state.currentUser;
      if (!user) return '';

      if (state.profileEditMode) {
        return `
          <div class="dashboard">
            <button class="back-btn" onclick="state.profileEditMode = false; render();">← Back to Profile</button>
            <div class="form-container" style="border-top-color:#6c5ce7;">
              <h2 class="form-title">Edit Profile</h2>
              <p class="form-subtitle">Update your creator information</p>
              <div class="form-section">
                <div class="form-row single">
                  <div class="form-group">
                    <label class="form-label">Affiliate Username <span class="required">*</span></label>
                    <input type="text" id="profile-username" class="form-input" value="${user.name}">
                  </div>
                </div>
                <div class="form-row single">
                  <div class="form-group">
                    <label class="form-label">Phone Number <span class="required">*</span></label>
                    ${(() => { const p = parseStoredPhone(user.phone); return phoneInputHtml('profile-phone', 'profile-phone-code', p.code, p.number); })()}
                  </div>
                </div>
              </div>
              <div class="form-actions">
                <button class="btn-primary creator-accent" onclick="handleSaveCreatorProfile()">Save Changes</button>
                <button class="btn-secondary" onclick="state.profileEditMode = false; render();">Cancel</button>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="dashboard">
          <button class="back-btn" onclick="state.view = 'creator'; render();">← Back to Dashboard</button>
          <div class="form-container" style="border-top-color:#6c5ce7;">
            <h2 class="form-title">My Profile</h2>
            <p class="form-subtitle">Your creator account information</p>
            <div class="form-section">
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label" style="color:#999;">Affiliate Username</label>
                  <div style="padding:12px 16px;background:#f9f9f9;border-radius:8px;font-size:14px;color:#333;">${user.name}</div>
                </div>
              </div>
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label" style="color:#999;">Phone Number</label>
                  <div style="padding:12px 16px;background:#f9f9f9;border-radius:8px;font-size:14px;color:#333;">${user.phone || '—'}</div>
                </div>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn-primary creator-accent" onclick="state.profileEditMode = true; render();">Edit Profile</button>
            </div>
          </div>
        </div>
      `;
    };

    const handleSaveCreatorProfile = async () => {
      const newName = document.getElementById('profile-username').value.trim();
      const newPhone = formatPhoneForStorage(document.getElementById('profile-phone-code').value, document.getElementById('profile-phone').value);
      if (!newName || !newPhone) {
        showNotification('Both Affiliate Username and Phone Number are required', 'error');
        return;
      }

      state.isLoading = true;
      render();
      const result = await apiCall('updateAffiliateProfile', {
        affiliateId: state.currentUser.id,
        data: { name: newName, phone: newPhone }
      });
      if (!result || !result.success) {
        state.isLoading = false;
        showNotification(result ? result.error : 'Failed to update profile', 'error');
        render();
        return;
      }

      // Update local state
      state.currentUser.name = newName;
      state.currentUser.phone = newPhone;
      const localCreator = state.creators.find(c => c.id === state.currentUser.id);
      if (localCreator) {
        localCreator.name = newName;
        localCreator.phone = newPhone;
      }

      // Reload all data to reflect cascading changes
      state.isLoading = false;
      await loadAllData();
      state.profileEditMode = false;
      showNotification(`Profile updated! ${result.updatedCount} related record(s) updated.`);
      render();
    };

    // ========================
    // RENDER: Internal Login
    // ========================

    const renderInternalLogin = () => {
      return `
        <div class="login-container">
          <button class="back-btn" onclick="setView('landing')">← Back</button>
          <div class="login-card" style="border-color:#333;">
            <div class="login-icon" style="background:#f5f5f5;">⚙️</div>
            <h2 class="login-title" style="color:#333;">Internal Team Login</h2>
            <p class="login-subtitle">Enter the team password and your email to continue</p>
            <div class="login-form">
              <input type="email" id="internal-email" class="login-input" placeholder="Your email">
              <input type="password" id="internal-password" class="login-input"
                placeholder="Team password"
                onkeydown="if(event.key==='Enter')document.getElementById('internal-login-btn').click()">
              <button id="internal-login-btn" class="login-btn" style="background:linear-gradient(135deg,#333 0%,#555 100%);box-shadow:0 2px 8px rgba(0,0,0,0.25);"
                onclick="handleInternalLogin(document.getElementById('internal-password').value, document.getElementById('internal-email').value)">
                Continue
              </button>
            </div>
          </div>
        </div>
      `;
    };

    const handleInternalLogin = async (password, email) => {
      if (!password || !email || !email.trim()) {
        showNotification('Please fill in all fields', 'error');
        return;
      }
      const btn = document.getElementById('internal-login-btn');
      if (btn) btn.disabled = true;
      state.isLoading = true;
      render();

      const result = await apiCall('validateInternalLogin', { password, email: email.trim() });
      if (!result || !result.success) {
        state.isLoading = false;
        showNotification(result ? result.error : 'Login failed. Please try again.', 'error');
        if (btn) btn.disabled = false;
        render();
        return;
      }

      state.currentUser = { ...result.member, type: 'internal' };
      state.view = 'internal';
      state.internalTab = 'brand-apps';
      state.isLoading = false;
      await loadAllData(true);
    };

    // ========================
    // RENDER: Internal Dashboard
    // ========================

    const renderInternalDashboard = () => {
      const displayBrandApps = filterBrandAppsByDisplayWindow(state.brandApplications);
      const displayCreatorApps = filterCreatorAppsByDisplayWindow(state.creatorApplications);
      const pendingBrandApps = displayBrandApps.filter(a => a.status === 'pending').length;
      const pendingCreatorApps = displayCreatorApps.filter(a => a.status === 'pending').length;
      const pendingConfirmations = displayCreatorApps.filter(a => a.status === 'approved').length;
      let confirmedSlots = 0;
      displayCreatorApps.filter(a => a.status === 'confirmed').forEach(a => { confirmedSlots += getTimeslots(a).length; });

      let tabContentHtml = '';

      if (state.internalTab === 'brand-apps') {
        tabContentHtml = renderInternalBrandApps();
      } else if (state.internalTab === 'creator-apps') {
        tabContentHtml = renderInternalCreatorApps();
      } else if (state.internalTab === 'pending-confirmations') {
        tabContentHtml = renderInternalPendingConfirmations();
      } else if (state.internalTab === 'calendar') {
        tabContentHtml = renderInternalCalendar();
      }

      return `
        <div class="dashboard">
          <div class="dashboard-header">
            <div>
              <h1 class="dashboard-title">Internal Dashboard</h1>
              <p class="dashboard-subtitle">Manage brand and creator applications</p>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value" style="color:#e67e22;">${pendingBrandApps}</div>
              <div class="stat-label">Brand Applications Pending Approval</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" style="color:#e67e22;">${pendingCreatorApps}</div>
              <div class="stat-label">Creator Applications Pending Approval</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" style="color:#6c5ce7;">${pendingConfirmations}</div>
              <div class="stat-label">Pending Creator Confirmation</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" style="color:#27ae60;">${confirmedSlots}</div>
              <div class="stat-label">Confirmed Slots</div>
            </div>
          </div>

          <div class="admin-tabs">
            <button class="admin-tab ${state.internalTab === 'brand-apps' ? 'active' : ''}"
              onclick="state.internalTab = 'brand-apps'; render();">
              Brand Applications ${pendingBrandApps > 0 ? `<span style="color:#e67e22;">(${pendingBrandApps} pending)</span>` : ''}
            </button>
            <button class="admin-tab ${state.internalTab === 'creator-apps' ? 'active' : ''}"
              onclick="state.internalTab = 'creator-apps'; render();">
              Creator Applications ${pendingCreatorApps > 0 ? `<span style="color:#e67e22;">(${pendingCreatorApps} pending)</span>` : ''}
            </button>
            <button class="admin-tab ${state.internalTab === 'pending-confirmations' ? 'active' : ''}"
              onclick="state.internalTab = 'pending-confirmations'; render();">
              Pending Creator Confirmations ${pendingConfirmations > 0 ? `<span style="color:#6c5ce7;">(${pendingConfirmations})</span>` : ''}
            </button>
            <button class="admin-tab ${state.internalTab === 'calendar' ? 'active' : ''}"
              onclick="state.internalTab = 'calendar'; render();">
              Calendar
            </button>
          </div>

          ${tabContentHtml}
        </div>
      `;
    };

    // Internal: Brand Applications
    const renderInternalBrandApps = () => {
      const filtered = filterBrandAppsByDisplayWindow(state.brandApplications);
      if (filtered.length === 0) {
        return `<div class="empty-state"><p style="color:#888;">No brand applications yet</p></div>`;
      }

      // Sort: pending first, then by date
      const sorted = [...filtered].sort((a, b) => {
        if (a.status === 'pending' && b.status !== 'pending') return -1;
        if (a.status !== 'pending' && b.status === 'pending') return 1;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      return sorted.map(app => {
        const isExpanded = state.expandedCards['int-' + app.id];
        return `
          <div class="app-card">
            <div class="app-card-header">
              <div>
                <div class="app-card-title">🏪 ${app.shopName}</div>
                <div style="font-size:12px;color:#666;margin-top:4px;">Submitted ${formatDate(app.createdAt)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:12px;">
                <span class="status-badge status-${app.status}">${app.status}</span>
                ${app.status === 'pending' ? `
                  <div class="action-btns">
                    <button class="action-btn btn-approve" onclick="handleApproveBrandApp('${app.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;"' : ''}>Approve</button>
                    <button class="action-btn btn-reject" onclick="handleRejectBrandApp('${app.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;"' : ''}>Reject</button>
                  </div>
                ` : ''}
              </div>
            </div>
            <div class="app-card-meta">
              <div class="app-card-meta-item">Shop ID: <strong>${app.shopId}</strong></div>
              <div class="app-card-meta-item">Month: <strong>${formatMonth(app.month)}</strong></div>
              <div class="app-card-meta-item"><strong>${app.streamCount}</strong> streams</div>
              <div class="app-card-meta-item">AMS: <strong>${app.amsCommission}%</strong></div>
              <div class="app-card-meta-item">${app.sellerType}</div>
            </div>
            ${isExpanded ? `
              <div class="app-card-detail-grid">
                <div class="app-card-detail"><div class="label">Products Sponsored/Creator</div><div class="value">${app.numProductsSponsored}</div></div>
                <div class="app-card-detail"><div class="label">Product Nom. Confirmed</div><div class="value">${String(app.productNominationsConfirmed) === 'true' ? '✓ Yes' : '✗ No'}</div></div>
                <div class="app-card-detail"><div class="label">Voucher Tier</div><div class="value">${app.voucherTier === 'tier1' ? 'Tier 1 Regular' : 'Tier 2 Lite'}</div></div>
                <div class="app-card-detail"><div class="label">Seller Site Required</div><div class="value">${String(app.sellerSiteRequired) === 'true' ? 'Yes' : 'No'}</div></div>
                <div class="app-card-detail"><div class="label">Package Activation</div><div class="value">${String(app.hasPackageActivation) === 'true' ? 'Yes' : 'No'}</div></div>
                <div class="app-card-detail"><div class="label">Preferred Date</div><div class="value">${app.preferredDate ? formatDate(app.preferredDate) : 'None'}</div></div>
                <div class="app-card-detail"><div class="label">PIC</div><div class="value">${app.sellerPicName} (${app.sellerPicMobile})</div></div>
                <div class="app-card-detail"><div class="label">PIC Email</div><div class="value">${app.sellerPicEmail || '—'}</div></div>
                <div class="app-card-detail"><div class="label">Brief</div><div class="value">${app.livestreamBrief ? `<a href="${app.livestreamBrief}" target="_blank" style="color:#6c5ce7;text-decoration:underline;">View Brief</a>` : '—'}</div></div>
              </div>
            ` : ''}
            <button class="expand-btn" onclick="toggleCardExpand('int-${app.id}')">
              ${isExpanded ? '▲ Show less' : '▼ Show full details'}
            </button>
          </div>
        `;
      }).join('');
    };

    // Internal: Creator Applications
    const renderInternalCreatorApps = () => {
      const filtered = filterCreatorAppsByDisplayWindow(state.creatorApplications);
      if (filtered.length === 0) {
        return `<div class="empty-state"><p style="color:#888;">No creator applications yet</p></div>`;
      }

      const sorted = [...filtered].sort((a, b) => {
        if (a.status === 'pending' && b.status !== 'pending') return -1;
        if (a.status !== 'pending' && b.status === 'pending') return 1;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      return sorted.map(app => {
        const slots = getTimeslots(app);
        return `
          <div class="app-card creator-app">
            <div class="app-card-header">
              <div>
                <div class="app-card-title">🎬 ${app.creatorName}</div>
                <div style="font-size:12px;color:#666;margin-top:4px;">Applied for 🏪 ${app.brandName || app.shopName}</div>
              </div>
              <div style="display:flex;align-items:center;gap:12px;">
                <span class="status-badge status-${app.status}">${app.status}</span>
                ${app.status === 'pending' ? `
                  <div class="action-btns">
                    <button class="action-btn btn-approve" onclick="handleApproveCreatorApp('${app.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;"' : ''}>Approve</button>
                    <button class="action-btn btn-reject" onclick="handleRejectCreatorApp('${app.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;"' : ''}>Reject</button>
                  </div>
                ` : ''}
              </div>
            </div>
            <div style="margin-top:8px;">
              <div style="font-size:12px;color:#888;margin-bottom:4px;">Timeslots:</div>
              ${slots.length > 0 ? slots.map(s => `
                <span style="display:inline-block;padding:4px 10px;background:#f0f0ff;border-radius:6px;font-size:12px;color:#6c5ce7;margin:2px;">📅 ${formatDate(s.date)} ${formatTime(s.startTime || s.time)}${s.endTime ? ' – ' + formatTime(s.endTime) : ''}</span>
              `).join('') : `
                <span style="font-size:13px;color:#888;">${formatDate(app.streamDate)} ${app.streamTime || ''}</span>
              `}
            </div>
            <div class="app-card-detail-grid">
              <div class="app-card-detail"><div class="label">Affiliate Username</div><div class="value">${app.affiliateUsername}</div></div>
              <div class="app-card-detail"><div class="label">Phone</div><div class="value">${app.phone}</div></div>
              <div class="app-card-detail"><div class="label">Telegram</div><div class="value">${app.telegram}</div></div>
              <div class="app-card-detail"><div class="label">Willing to Travel to Seller Site</div><div class="value">${String(app.willingToTravel) === 'true' ? 'Yes' : 'No'}</div></div>
              <div class="app-card-detail" style="grid-column: span 2;"><div class="label">Shipping Address</div><div class="value">${app.shippingAddress}</div></div>
            </div>
          </div>
        `;
      }).join('');
    };

    // Internal: Pending Creator Confirmations
    const renderInternalPendingConfirmations = () => {
      const pendingConfirm = filterCreatorAppsByDisplayWindow(state.creatorApplications).filter(a => a.status === 'approved');
      if (pendingConfirm.length === 0) {
        return `<div class="empty-state"><p style="color:#888;">No applications pending creator confirmation</p></div>`;
      }

      return pendingConfirm.map(app => {
        const slots = getTimeslots(app);
        const phoneParsed = parseStoredPhone(app.phone);
        const displayPhone = '+' + phoneParsed.code + ' ' + phoneParsed.number;
        return `
          <div class="app-card creator-app">
            <div class="app-card-header">
              <div>
                <div class="app-card-title">🎬 ${app.creatorName}</div>
                <div style="font-size:12px;color:#666;margin-top:4px;">Applied for 🏪 ${app.brandName || app.shopName}</div>
              </div>
              <span class="status-badge status-approved">Awaiting Confirmation</span>
            </div>
            <div style="margin-top:8px;">
              <div style="font-size:12px;color:#888;margin-bottom:4px;">Timeslots:</div>
              ${slots.length > 0 ? slots.map(s => `
                <span style="display:inline-block;padding:4px 10px;background:#f0f0ff;border-radius:6px;font-size:12px;color:#6c5ce7;margin:2px;">📅 ${formatDate(s.date)} ${formatTime(s.startTime || s.time)}${s.endTime ? ' – ' + formatTime(s.endTime) : ''}</span>
              `).join('') : '—'}
            </div>
            <div class="app-card-detail-grid">
              <div class="app-card-detail"><div class="label">Affiliate Username</div><div class="value">${app.affiliateUsername}</div></div>
              <div class="app-card-detail"><div class="label">Phone</div><div class="value">${displayPhone}</div></div>
              <div class="app-card-detail"><div class="label">Telegram</div><div class="value">${app.telegram}</div></div>
              <div class="app-card-detail" style="grid-column: span 2;"><div class="label">Shipping Address</div><div class="value">${app.shippingAddress || '—'}</div></div>
            </div>
          </div>
        `;
      }).join('');
    };

    // Internal: Calendar
    const renderInternalCalendar = () => {
      const year = state.calendarYear;
      const month = state.calendarMonth;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      // Build calendar events from creator applications (no display window filter — calendar has its own navigation)
      const calendarEvents = []; // { date, time, creatorName, brandName, status }
      state.creatorApplications
        .filter(ca => ca.status === 'confirmed' || ca.status === 'approved' || ca.status === 'pending')
        .forEach(ca => {
          const slots = getTimeslots(ca);
          slots.forEach(slot => {
            calendarEvents.push({
              date: slot.date,
              startTime: slot.startTime || slot.time,
              endTime: slot.endTime || '',
              creatorName: ca.creatorName,
              brandName: ca.brandName || ca.shopName,
              status: ca.status
            });
          });
        });

      const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      let cells = '';
      // Empty cells before first day
      for (let i = 0; i < firstDay; i++) {
        cells += '<div class="calendar-day empty"></div>';
      }
      // Day cells
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const daySlots = calendarEvents.filter(e => e.date === dateStr);
        const eventsHtml = daySlots.map(e =>
          `<div class="calendar-event ${e.status}">${e.creatorName} → ${e.brandName}${e.startTime ? ' ' + formatTime(e.startTime) : ''}${e.endTime ? '–' + formatTime(e.endTime) : ''}</div>`
        ).join('');

        cells += `
          <div class="calendar-day">
            <div class="calendar-day-num">${day}</div>
            ${eventsHtml}
          </div>
        `;
      }

      return `
        <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
          <button class="btn-secondary" style="padding:8px 16px;" onclick="
            state.calendarMonth--;
            if(state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear--; }
            render();
          ">← Prev</button>
          <h3 style="font-size:18px;">${monthName}</h3>
          <button class="btn-secondary" style="padding:8px 16px;" onclick="
            state.calendarMonth++;
            if(state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear++; }
            render();
          ">Next →</button>
        </div>
        <div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;">
            <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background-color:#e8f5e9;border:1px solid #27ae60;"></span>
            <span style="color:#666;">Confirmed</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;">
            <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background-color:#e3f2fd;border:1px solid #1976d2;"></span>
            <span style="color:#666;">Approved (Pending Creator Confirmation)</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;">
            <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background-color:#fff3e0;border:1px solid #e67e22;"></span>
            <span style="color:#666;">Pending Approval</span>
          </div>
        </div>
        <div class="calendar-month">
          ${dayHeaders.map(d => `<div class="calendar-day-header">${d}</div>`).join('')}
          ${cells}
        </div>
      `;
    };

    // Initialize
    loadAllData();
  </script>
</body>
</html>
