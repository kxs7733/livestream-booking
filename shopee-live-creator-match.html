                </div>
                ${row.status === 'rejected' && row.rejectionReason ? `<div style="margin-top:8px;padding:8px 12px;background:#ffebee;border-radius:6px;font-size:13px;color:#e74c3c;"><strong>Rejection Reason:</strong> ${row.rejectionReason}</div>` : ''}
                ${brandApp ? `
                  <div class="app-card-meta">
                    <div class="app-card-meta-item">Category: <strong>${brandApp.sellerType || '—'}</strong></div>
                    <div class="app-card-meta-item">Stream Month: <strong>${formatMonth(brandApp.month)}</strong></div>
                    <div class="app-card-meta-item">AMS: <strong>${brandApp.amsCommission ? brandApp.amsCommission + '%' : '—'}</strong></div>
                    ${brandApp.streamLocation ? `<div class="app-card-meta-item">Location: <strong>${brandApp.streamLocation}</strong></div>` : ''}
                    ${(String(brandApp.sellerSiteRequired) === 'true' || (brandApp.streamLocation || '').trim().toLowerCase() === 'seller site') ? `<div class="app-card-meta-item" style="color:#e67e22;">📍 Seller site stream only</div>` : ''}
                  </div>
                  ${(String(brandApp.sellerSiteRequired) === 'true' || (brandApp.streamLocation || '').trim().toLowerCase() === 'seller site') ? (row.status === 'approved' && brandApp.sellerSiteAddress ? `<div style="margin-top:6px;font-size:13px;color:#888;">📍 <strong>Seller Site Address:</strong> ${brandApp.sellerSiteAddress}${brandApp.sellerSitePostalCode ? ', S' +brandApp.sellerSitePostalCode : ''}</div>` : (brandApp.sellerSitePostalCode ? `<div style="margin-top:6px;font-size:13px;color:#888;">📍 <strong>Seller Site Postal Code:</strong> ${brandApp.sellerSitePostalCode}</div>` : '')) : ''}
                ` : ''}
                <div class="app-card-detail-grid" style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;">
                  <div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Stream Date & Time</div><div class="value" style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;">${slotsHtml}${String(row.hasSamples) === 'true' ? '<span style="display:inline-block;padding:4px 10px;background:#e8f4f8;color:#2980b9;border-radius:6px;font-size:12px;font-weight:600;">📦 Has Existing Samples</span>' : ''}</div></div>
                </div>
                <div style="margin-top:10px;font-size:12px;color:#888;">${contactLine}</div>
                <div style="margin-top:10px;">
                  <span style="font-size:13px;color:#888;cursor:pointer;text-decoration:underline;text-underline-offset:3px;" onclick="state.expandedCards['${cardKey}'] = !state.expandedCards['${cardKey}']; render();">
                    ${isExpanded ? 'Hide Details ▲' : 'View Details ▼'}
                  </span>
                </div>
                ${isExpanded ? `
                  <div style="margin-top:12px;padding:12px;background:#f0faf4;border-radius:8px;border:1px solid #c3e6cb;">
                    <div style="font-size:12px;font-weight:700;color:#27ae60;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Your Details</div>
                    <div class="app-card-detail-grid">
                      <div class="app-card-detail"><div class="label">Telegram</div><div class="value">${row.telegram || '—'}</div></div>
                      <div class="app-card-detail"><div class="label">Mobile</div><div class="value">${row.phone || '—'}</div></div>
                      ${row.shippingRecipientName ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Shipping Recipient Name</div><div class="value">${row.shippingRecipientName}</div></div>` : ''}
                      <div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Shipping Address</div><div class="value">${row.shippingAddress ? row.shippingAddress + (row.shippingPostalCode ? ', S' +row.shippingPostalCode : '') : '—'}</div></div>
                      ${row.deliveryInstructions ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Delivery Instructions</div><div class="value">${row.deliveryInstructions}</div></div>` : ''}
                    </div>
                  </div>
                  ${brandApp ? `
                  <div style="margin-top:8px;padding:12px;background:#fff8f0;border-radius:8px;border:1px solid #fcddd4;">
                    <div style="font-size:12px;font-weight:700;color:#e67e22;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Brand Details</div>
                    <div class="app-card-detail-grid">
                      <div class="app-card-detail"><div class="label">Brand Activation</div><div class="value">${String(brandApp.hasPackageActivation) === 'true' ? 'Yes' : 'No'}</div></div>
                      ${String(brandApp.hasPackageActivation) === 'true' ? `<div class="app-card-detail"><div class="label">Brand Activation Type</div><div class="value">${getBrandActivationLabel(brandApp.brandActivationType)}</div></div>` : ''}
                      ${String(brandApp.hasPackageActivation) === 'true' && brandApp.preferredDate ? `<div class="app-card-detail"><div class="label">Activation Date</div><div class="value">${formatDate(brandApp.preferredDate)}</div></div>` : ''}
                      <div class="app-card-detail"><div class="label">Seller PIC</div><div class="value">${brandApp.sellerPicName || '—'}${brandApp.sellerPicMobile ? ' · ' + brandApp.sellerPicMobile : ''}</div></div>
                      <div class="app-card-detail"><div class="label">Seller PIC Email</div><div class="value">${brandApp.sellerPicEmail || '—'}</div></div>
                      ${brandApp.livestreamBrief ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Livestream Brief</div><div class="value"><a href="${brandApp.livestreamBrief}" target="_blank" style="color:#6c5ce7;text-decoration:underline;">View Brief</a></div></div>` : ''}
                    </div>
                  </div>` : ''}
                ` : ''}
              </div>
            `;
          }).join('');
        }
      }

      return `
        <div class="dashboard">
          <div class="dashboard-header">
            <div>
              <h1 class="dashboard-title">Creator Dashboard</h1>
              <p class="dashboard-subtitle">Browse brands and apply for livestream slots</p>
              <p style="font-size:13px;color:#888;margin-top:6px;">If you have any issues with your application, please reach out to ${getContactPairs().join(' / ')}.</p>
            </div>
          </div>
          <div style="padding:12px 16px;background:#e3f2fd;border-radius:8px;margin-bottom:16px;font-size:13px;color:#1565c0;">
            📬 To receive Telegram notifications when your applications are approved, send <strong>/start</strong> to
            <a href="https://t.me/${TELEGRAM_BOT_USERNAME}" target="_blank" style="color:#1565c0;font-weight:600;">@${TELEGRAM_BOT_USERNAME}</a>
          </div>
          <div class="filter-tabs">
            <button class="filter-tab ${state.creatorTab === 'available' ? 'active' : ''}"
              onclick="state.creatorTab = 'available'; render();">
              Available Brands (${availableBrands.length})
            </button>
            <button class="filter-tab ${state.creatorTab === 'confirmed-livestreams' ? 'active' : ''}"
              onclick="state.creatorTab = 'confirmed-livestreams'; render();">
              Confirmed Livestreams (${confirmedCAs.length})${pendingReceiptCount > 0 ? ` <span style="background:#e65100;color:white;border-radius:10px;padding:3px 8px;font-size:11px;margin-left:4px;font-weight:600;">⚠️ ${pendingReceiptCount}</span>` : ''}
            </button>
            <button class="filter-tab ${state.creatorTab === 'my-applications' ? 'active' : ''}"
              onclick="state.creatorTab = 'my-applications'; render();">
              My Applications (${myApps.length})
            </button>
          </div>
          ${contentHtml}
        </div>
      `;
    };

    // ========================
    // RENDER: Creator Apply Form
    // ========================

    const renderCreatorApplyForm = (brandAppId) => {
      const brandApp = state.brandApplications.find(a => a.id === brandAppId);
      if (!brandApp) {
        if (state.internalCreatorApplyMode) { state.internalCreatorApplyMode = null; }
        else { state.showCreatorApplyForm = null; }
        render();
        return '';
      }
      const isInternal = state.currentUser?.type === 'internal';

      // Get already-taken date/times for this shop, filtered to the stream month for display
      const takenList = getTakenTimeslotObjects(brandAppId)
        .filter(s => !brandApp?.month || s.date.substring(0, 7) === brandApp.month);

      // Get creator's own confirmed timeslots across all brands
      const myConfirmedList = getCreatorConfirmedTimeslots().map(s => ({ date: s.date, time: s.startTime }));

      // Get creator's own streams at OTHER shops this month (for reference display)
      const currentShopId = brandApp ? (brandApp.shopId || brandApp.brandId || '') : '';
      const currentShopBrandAppIds = currentShopId
        ? state.brandApplications.filter(ba => (ba.shopId || ba.brandId) === currentShopId).map(ba => ba.id)
        : [brandAppId];
      const creatorUserId = (state.internalCreatorApplyMode && state.internalSelectedCreatorId)
        ? state.internalSelectedCreatorId : state.currentUser?.id;
      const myOtherStreamsList = creatorUserId
        ? state.creatorApplications.filter(a =>
            String(a.creatorId) === String(creatorUserId) &&
            !currentShopBrandAppIds.some(id => String(id) === String(a.brandApplicationId)) &&
            a.status !== 'rejected' && a.status !== 'cancelled' &&
            brandApp?.month && String(a.streamDate).substring(0, 7) === brandApp.month
          )
        : [];

      // Get creator's previous applications for this specific brand
      const myPrevApps = getCreatorAppsForBrand(brandAppId);
      const myPrevSlots = [];
      myPrevApps.forEach(app => {
        getTimeslots(app).forEach(slot => {
          myPrevSlots.push({ ...slot, status: app.status });
        });
      });

      const selectedTimeslots = state.creatorFormTimeslots;

      return `
        <div class="dashboard">
          <button class="back-btn" onclick="${isInternal ? 'cancelInternalCreatorApply()' : 'state.showCreatorApplyForm = null; state.creatorFormTimeslots = []; state.creatorFormData = { telegram: \'\', recipientName: \'\', address: \'\', postalCode: \'\', willingToTravel: false }; render();'}">← Back to Brands</button>

          <div style="background:#fff;border-radius:12px;padding:24px;margin-bottom:24px;border-left:4px solid #ee4d2d;">
            <h3 style="font-size:18px;margin-bottom:12px;">🏪 ${brandApp.shopName}</h3>
            <div style="display:inline-block;padding:4px 10px;background:#f0f0f0;border-radius:6px;font-size:12px;color:#555;font-weight:500;margin-bottom:8px;">${brandApp.sellerType || 'Uncategorized'}</div>
            <div class="app-card-meta">
              <div class="app-card-meta-item">Month: <strong>${formatMonth(brandApp.month)}</strong></div>
              <div class="app-card-meta-item">AMS: <strong>${brandApp.amsCommission}%</strong></div>
              ${String(brandApp.sellerSiteRequired) === 'true' ? '<div class="app-card-meta-item" style="color:#e67e22;">📍 Seller site stream only</div>' : ''}
            </div>
            ${brandApp.livestreamBrief ? `<p style="margin-top:12px;"><a href="${brandApp.livestreamBrief}" target="_blank" style="font-size:13px;color:#6c5ce7;text-decoration:underline;">📄 View Livestream Brief</a></p>` : ''}
          </div>

          ${myPrevSlots.length > 0 ? `
            <div style="background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:24px;border-left:4px solid #6c5ce7;">
              <p style="font-size:14px;font-weight:600;color:#333;margin-bottom:4px;">Your Previous Applications for This Brand's Listing</p>
              <p style="font-size:12px;color:#888;margin-bottom:10px;">A brand can have multiple listings per month — only this listing's applications are shown.</p>
              <div style="display:flex;flex-wrap:wrap;gap:6px;">
                ${myPrevSlots.map(s => `
                  <span style="display:inline-block;padding:5px 12px;background:${s.status === 'approved' ? '#e8f5e9' : s.status === 'pending' ? '#fff3e0' : '#ffebee'};border-radius:6px;font-size:12px;color:${s.status === 'approved' ? '#27ae60' : s.status === 'pending' ? '#e67e22' : '#e74c3c'};">
                    📅 ${formatDate(s.date)} ${formatTime(s.startTime || s.time)}${s.endTime ? ' – ' + (s.endDate && s.endDate !== s.date ? formatDate(s.endDate) + ' ' : '') + formatTime(s.endTime) : ''} <span style="text-transform:uppercase;font-weight:600;font-size:10px;">${s.status}</span>
                  </span>
                `).join('')}
              </div>
            </div>
          ` : ''}

          <div class="form-container" id="creator-app-form">
            <h2 class="form-title">Apply for This Brand</h2>
            <p class="form-subtitle">Select your preferred streaming timeslots and provide your details</p>

            ${(() => {
              const isSellerSite = String(brandApp.sellerSiteRequired) === 'true';
              const predefinedSlots = brandApp.sellerSiteTimeslots || [];
              if (isSellerSite) {
                // ── Seller site: chip selector ──
                const myConfirmedFull = getCreatorConfirmedTimeslots();
                const allSlotsFilled = predefinedSlots.length > 0 && predefinedSlots.every(slot => {
                  const asSlot = { date: slot.date, startTime: slot.startTime, endDate: slot.endDate || slot.date, endTime: slot.endTime };
                  return takenList.some(t => timeslotsOverlap(asSlot, t));
                });
                if (allSlotsFilled) {
                  return `
                    <div class="form-section">
                      <div class="form-section-title creator-accent">Select Your Timeslots</div>
                      <div style="padding:20px;text-align:center;background:#fff5f5;border-radius:8px;border:1px solid #fcddd4;">
                        <p style="font-size:14px;font-weight:600;color:#e74c3c;margin-bottom:6px;">All Timeslots Filled</p>
                        <p style="font-size:13px;color:#888;">All available timeslots for this brand have been confirmed. No further applications are accepted.</p>
                      </div>
                    </div>`;
                }
                const chipsHtml = predefinedSlots.length === 0
                  ? `<div style="padding:20px;text-align:center;background:#f9f9f9;border-radius:8px;border:1px dashed #ddd;"><p style="font-size:13px;color:#999;">No timeslots have been set up for this brand yet. Please contact the Shopee team.</p></div>`
                  : `<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
                      ${predefinedSlots.map((slot, i) => {
                        const asSlot = { date: slot.date, startTime: slot.startTime, endDate: slot.endDate || slot.date, endTime: slot.endTime };
                        const isSelected = selectedTimeslots.some(s => s.date === slot.date && s.startTime === slot.startTime);
                        const isTaken = !isSelected && takenList.some(s => timeslotsOverlap(asSlot, s));
                        const isConflict = !isSelected && !isTaken && myConfirmedFull.some(s => timeslotsOverlap(asSlot, { date: s.date, startTime: s.startTime, endDate: s.endDate || s.date, endTime: s.endTime }));
                        let bg, border, color, cursor, extra = '';
                        if (isSelected)       { bg='#EE4D2D'; border='#EE4D2D'; color='#fff';   cursor='pointer'; }
                        else if (isTaken)     { bg='#f5f5f5'; border='#ddd';    color='#aaa';   cursor='not-allowed'; extra=' · Taken'; }
                        else if (isConflict)  { bg='#fff8e1'; border='#ffe082'; color='#e65100';cursor='not-allowed'; extra=' · ⚠️ Conflicts'; }
                        else                  { bg='#fff';    border='#ddd';    color='#333';   cursor='pointer'; }
                        return `<button type="button"
                          ${isTaken || isConflict ? 'disabled' : `onclick="toggleSellerSlot('${brandAppId}', ${i})"`}
                          style="display:inline-flex;align-items:center;gap:5px;padding:10px 16px;background:${bg};border:2px solid ${border};border-radius:20px;font-size:13px;color:${color};cursor:${cursor};font-weight:${isSelected?'600':'400'};">
                          ${isSelected ? '✓ ' : ''}📅 ${formatDate(slot.date)} · ${formatTime(slot.startTime)}–${formatTime(slot.endTime)}${extra}
                        </button>`;
                      }).join('')}
                    </div>
                    ${selectedTimeslots.length > 0 ? `<div style="font-size:13px;color:#555;font-weight:600;">${selectedTimeslots.length} slot${selectedTimeslots.length!==1?'s':''} selected — must be even number (e.g. 2, 4…)</div>` : ''}`;
                return `
                  <div class="form-section">
                    <div class="form-section-title creator-accent">Select Your Timeslots</div>
                    <p style="font-size:13px;color:#888;margin-bottom:16px;">Choose from the brand's available timeslots. Select an <strong>even number</strong> (e.g. 2, 4…). Taken or conflicting slots cannot be selected.</p>
                    ${chipsHtml}
                    ${myOtherStreamsList.length > 0 ? `
                      <div style="margin-top:16px;padding:12px 16px;background:#f4f0ff;border-radius:8px;">
                        <p style="font-size:12px;color:#6c5ce7;font-weight:600;margin-bottom:6px;">Your other streams this month:</p>
                        ${myOtherStreamsList.map(s => `<span style="display:inline-block;padding:3px 8px;background:#e0d8ff;border-radius:4px;font-size:11px;color:#6c5ce7;margin:2px;">${formatDate(s.streamDate)} ${formatTime(s.streamTime)}${s.streamEndTime ? ' – ' + (s.streamEndDate && s.streamEndDate !== s.streamDate ? formatDate(s.streamEndDate) + ' ' : '') + formatTime(s.streamEndTime) : ''}</span>`).join('')}
                      </div>
                    ` : ''}
                  </div>`;
              } else {
                // ── Creator site: free-form picker (unchanged) ──
                const [yr, mo] = brandApp.month.split('-').map(Number);
                const lastDay = new Date(yr, mo, 0).getDate();
                const monthMin = `${brandApp.month}-01`;
                const monthMax = `${brandApp.month}-${String(lastDay).padStart(2,'0')}`;
                const hours = Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
                return `
                  <div class="form-section">
                    <div class="form-section-title creator-accent">Stream Schedule</div>
                    <p style="font-size:13px;color:#888;margin-bottom:16px;">Add your preferred timeslots in <strong>even numbers</strong> (e.g. 2, 4, 6…). Each stream must start within <strong>${formatMonth(brandApp.month)}</strong> and be at least 2 hours long. Slots taken by other creators are blocked.</p>
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Stream Start</label>
                        <input type="date" id="f-start-date" class="form-input" min="${monthMin}" max="${monthMax}" style="width:100%;margin-bottom:6px;">
                        <div style="display:flex;align-items:center;gap:6px;">
                          <select id="f-start-hour" class="form-input" style="flex:1;">
                            ${hours.map(h=>`<option value="${h}">${h}</option>`).join('')}
                          </select>
                          <span style="font-weight:700;color:#888;flex-shrink:0;">:</span>
                          <select id="f-start-min" class="form-input" style="flex:1;">
                            <option value="00">00</option>
                            <option value="30">30</option>
                          </select>
                        </div>
                      </div>
                      <div class="form-group">
                        <label class="form-label">Stream End</label>
                        <input type="date" id="f-end-date" class="form-input" min="${monthMin}" max="${monthMax}" style="width:100%;margin-bottom:6px;">
                        <div style="display:flex;align-items:center;gap:6px;">
                          <select id="f-end-hour" class="form-input" style="flex:1;">
                            ${hours.map(h=>`<option value="${h}">${h}</option>`).join('')}
                          </select>
                          <span style="font-weight:700;color:#888;flex-shrink:0;">:</span>
                          <select id="f-end-min" class="form-input" style="flex:1;">
                            <option value="00">00</option>
                            <option value="30">30</option>
                          </select>
                        </div>
                      </div>
                    </div>
                    <button type="button" class="btn-secondary" style="margin-top:8px;" onclick="addTimeslot('${brandAppId}')">+ Add Timeslot</button>
                    ${selectedTimeslots.length > 0 ? `
                      <div style="margin-top:16px;">
                        <label class="form-label" style="margin-bottom:8px;">Selected Timeslots (${selectedTimeslots.length})</label>
                        ${selectedTimeslots.map((slot, i) => `
                          <div style="display:flex;align-items:center;gap:12px;padding:10px 16px;background:#f0f0ff;border-radius:8px;margin-bottom:6px;border:1px solid #e0e0ff;">
                            <span style="flex:1;font-size:14px;color:#333;">📅 ${formatDate(slot.date)} ${formatTime(slot.startTime)} — ${slot.endDate && slot.endDate !== slot.date ? formatDate(slot.endDate) + ' ' : ''}${formatTime(slot.endTime)}</span>
                            <button type="button" class="timeslot-remove-btn" onclick="removeTimeslot(${i})">✕</button>
                          </div>
                        `).join('')}
                      </div>
                    ` : `
                      <div style="margin-top:16px;padding:20px;text-align:center;background:#f9f9f9;border-radius:8px;border:1px dashed #ddd;">
                        <p style="font-size:13px;color:#999;">No timeslots added yet. Select a start and end date/time, then click "+ Add Timeslot". You need an even number of timeslots (e.g. 2, 4, 6…).</p>
                      </div>
                    `}
                    ${takenList.length > 0 ? `
                      <div style="margin-top:16px;padding:12px 16px;background:#fff3e0;border-radius:8px;">
                        <p style="font-size:12px;color:#e67e22;font-weight:600;margin-bottom:6px;">Unavailable slots (already taken):</p>
                        ${takenList.map(s => `<span style="display:inline-block;padding:3px 8px;background:#ffe0b2;border-radius:4px;font-size:11px;color:#e67e22;margin:2px;">${formatDate(s.date)} ${formatTime(s.startTime)}${s.endTime ? ' – ' + (s.endDate && s.endDate !== s.date ? formatDate(s.endDate) + ' ' : '') + formatTime(s.endTime) : ''}</span>`).join('')}
                      </div>
                    ` : ''}
                    ${myOtherStreamsList.length > 0 ? `
                      <div style="margin-top:16px;padding:12px 16px;background:#f4f0ff;border-radius:8px;">
                        <p style="font-size:12px;color:#6c5ce7;font-weight:600;margin-bottom:6px;">Your other streams this month:</p>
                        ${myOtherStreamsList.map(s => `<span style="display:inline-block;padding:3px 8px;background:#e0d8ff;border-radius:4px;font-size:11px;color:#6c5ce7;margin:2px;">${formatDate(s.streamDate)} ${formatTime(s.streamTime)}${s.streamEndTime ? ' – ' + (s.streamEndDate && s.streamEndDate !== s.streamDate ? formatDate(s.streamEndDate) + ' ' : '') + formatTime(s.streamEndTime) : ''}</span>`).join('')}
                      </div>
                    ` : ''}
                  </div>`;
              }
            })()}

            <div class="form-section">
              <div class="form-section-title creator-accent">Your Details</div>
              ${(() => {
                if (!isInternal) return '';
                const selectedCreator = state.creators.find(c => c.id === state.internalSelectedCreatorId);
                return `<div style="background:#f0f7ff;border:1px solid #b3d1f0;border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;">
                  <span style="font-size:13px;color:#2980b9;font-weight:600;">Creator:</span>
                  <span style="font-size:13px;color:#333;">${selectedCreator ? selectedCreator.name : '—'}</span>
                </div>`;
              })()}
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Affiliate Username <span class="required">*</span></label>
                  ${(() => {
                    if (isInternal) {
                      const c = state.creators.find(cr => cr.id === state.internalSelectedCreatorId);
                      return `<input type="text" id="f-affiliate-user" class="form-input" value="${c ? c.name : ''}" readonly style="opacity:0.7;cursor:not-allowed;background:#f0f0f0;">`;
                    }
                    return `<input type="text" id="f-affiliate-user" class="form-input" value="${state.currentUser.name}" readonly style="opacity:0.7;cursor:not-allowed;background:#f0f0f0;">`;
                  })()}
                </div>
                <div class="form-group">
                  <label class="form-label">Phone Number <span class="required">*</span></label>
                  ${(() => {
                    const p = isInternal
                      ? parseStoredPhone(state.creators.find(c => c.id === state.internalSelectedCreatorId)?.phone)
                      : parseStoredPhone(state.currentUser.phone);
                    return `
                      <div style="display:flex;gap:8px;">
                        <select id="f-phone-code" class="form-input" style="width:130px;min-width:130px;flex-shrink:0;">
                          ${countryCodes.map(cc => `<option value="${cc.code}" ${cc.code === p.code ? 'selected' : ''}>${cc.label}</option>`).join('')}
                        </select>
                        <input type="tel" id="f-phone" class="form-input" value="${p.number}" style="flex:1;">
                      </div>
                      <div class="form-hint" style="margin-top:4px;">Editing phone here only applies to this application, not your profile.</div>
                    `;
                  })()}
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Telegram Username <span class="required">*</span></label>
                  <input type="text" id="f-telegram" class="form-input" placeholder="username (without @)" value="${state.creatorFormData.telegram || ''}">
                </div>
                <div class="form-group" style="grid-column: span 1;">
                </div>
              </div>
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label">Shipping Recipient Name <span class="required">*</span></label>
                  <input type="text" id="f-recipient-name" class="form-input" placeholder="Full name of the recipient" value="${state.creatorFormData.recipientName || ''}">
                  <div class="form-hint" style="margin-top:4px;">Name of person receiving the samples at the shipping address.</div>
                </div>
              </div>
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label">Shipping Address <span class="required">*</span></label>
                  <div style="font-size:12px;color:#aaa;margin-bottom:6px;">Blk, Street, Building Name</div>
                  <textarea id="f-address" class="form-textarea" placeholder="e.g. 123 Orchard Road, #01-01" style="min-height:80px;">${state.creatorFormData.address || (isInternal ? '' : (state.currentUser?.shippingAddress || ''))}</textarea>
                  <div class="form-group" style="margin-top:10px;">
                    <label class="form-label">Postal Code <span class="required">*</span></label>
                    <input type="text" id="f-postal-code" class="form-input" placeholder="6-digit postal code" maxlength="6" inputmode="numeric" value="${state.creatorFormData.postalCode || (isInternal ? '' : (state.currentUser?.shippingPostalCode || ''))}">
                  </div>
                  <div class="form-hint" style="margin-top:8px;">Address where brands will send product samples to you.</div>
                </div>
              </div>
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label">Delivery Instructions <span style="font-size:12px;color:#999;font-weight:400;">(optional)</span></label>
                  <textarea id="f-delivery-instructions" class="form-textarea" placeholder="e.g. Leave at shoe rack, Ring doorbell" style="min-height:60px;">${state.creatorFormData.deliveryInstructions || ''}</textarea>
                </div>
              </div>
              ${String(brandApp.sellerSiteRequired) === 'true' ? `
                <div class="form-checkbox-row" onclick="this.querySelector('input').click()">
                  <input type="checkbox" id="f-travel" onclick="event.stopPropagation()" ${state.creatorFormData.willingToTravel ? 'checked' : ''}>
                  <div>
                    <div class="form-checkbox-label">I am willing to travel to the seller's site for this stream</div>
                    <div class="form-hint">This brand requires streaming from their location</div>
                  </div>
                </div>
              ` : '<input type="hidden" id="f-travel">'}
              <div class="form-checkbox-row" onclick="this.querySelector('input').click()">
                <input type="checkbox" id="f-has-samples" onclick="event.stopPropagation()">
                <div>
                  <div class="form-checkbox-label">I already have samples from this seller for this livestream</div>
                  <div class="form-hint">Please confirm that you have existing samples from this seller. If you select this, the seller will not send out new samples.</div>
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button class="btn-primary creator-accent" onclick="handleSubmitCreatorApplication('${brandAppId}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>${state.isSubmitting ? 'Submitting...' : 'Submit Application'}</button>
              <button class="btn-secondary" onclick="${isInternal ? 'cancelInternalCreatorApply()' : 'state.showCreatorApplyForm = null; state.creatorFormTimeslots = []; state.creatorFormData = { telegram: \'\', recipientName: \'\', address: \'\', postalCode: \'\', willingToTravel: false }; render();'}" ${state.isSubmitting ? 'disabled' : ''}>Cancel</button>
            </div>
          </div>
        </div>
      `;
    };

    // ========================
    // RENDER: Brand Profile
    // ========================

    // ========================
    // RENDER: Brand Setup (new seller — mandatory site address)
    // ========================

    const renderBrandSetup = () => {
      return `
        <div class="dashboard">
          <div class="form-container">
            <h2 class="form-title">Welcome! One more step</h2>
            <p class="form-subtitle">Please provide your seller site address before continuing. This is required for brand applications that involve streaming at your location.</p>
            <div class="form-section">
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label">Seller Site Address <span class="required">*</span></label>
                  <div style="font-size:12px;color:#aaa;margin-bottom:6px;">Blk, Street, Building Name</div>
                  <textarea id="setup-site-address" class="form-textarea" placeholder="e.g. 123 Orchard Road, #01-01" style="min-height:80px;">${state.currentUser?.siteAddress || ''}</textarea>
                  <div class="form-group" style="margin-top:10px;">
                    <label class="form-label">Postal Code <span class="required">*</span></label>
                    <input type="text" id="setup-site-postal" class="form-input" placeholder="6-digit postal code" maxlength="6" inputmode="numeric" value="${state.currentUser?.sitePostalCode || ''}">
                  </div>
                  <div class="form-hint" style="margin-top:8px;">The full address of your shop. This will be used as the stream location if hosting at your site.</div>
                </div>
              </div>
            </div>
            <div class="form-actions">
              <button id="brand-setup-save-btn" class="btn-primary" onclick="handleSaveBrandSetup()">
                Save & Continue
              </button>
            </div>
          </div>
        </div>
      `;
    };

    const handleSaveBrandSetup = async () => {
      const siteAddress = document.getElementById('setup-site-address').value.trim();
      const sitePostalCode = document.getElementById('setup-site-postal').value.trim();
      if (!siteAddress) {
        showNotification('Please enter your seller site address', 'error');
        return;
      }
      if (!/^\d{6}$/.test(sitePostalCode)) {
        showNotification('Please enter a valid 6-digit postal code', 'error');
        return;
      }
      const btn = document.getElementById('brand-setup-save-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
      const result = await apiCall('updateSellerProfile', { shopId: state.currentUser.shopId, data: { siteAddress, sitePostalCode } });
      if (!result || !result.success) {
        if (btn) { btn.disabled = false; btn.textContent = 'Save & Continue'; }
        showNotification(result ? result.error : 'Failed to save. Please try again.', 'error');
        return;
      }
      state.currentUser.siteAddress = siteAddress;
      state.currentUser.sitePostalCode = sitePostalCode;
      const localBrand = state.brands.find(b => b.id === state.currentUser.shopId);
      if (localBrand) { localBrand.siteAddress = siteAddress; localBrand.sitePostalCode = sitePostalCode; }
      state.view = 'brand';
      render();
    };

    const renderCreatorSetup = () => {
      return `
        <div class="dashboard">
          <div class="form-container" style="border-top-color:#6c5ce7;">
            <h2 class="form-title">Welcome! One more step</h2>
            <p class="form-subtitle">Please provide your shipping address before continuing. This is where brands will send product samples to you.</p>
            <div class="form-section">
              <div class="form-row single">
                <div class="form-group">
                  <label class="form-label">Shipping Address <span class="required">*</span></label>
                  <div style="font-size:12px;color:#aaa;margin-bottom:6px;">Blk, Street, Building Name</div>
                  <textarea id="setup-shipping-address" class="form-textarea" placeholder="e.g. 123 Orchard Road, #01-01" style="min-height:80px;">${state.currentUser?.shippingAddress || ''}</textarea>
                  <div class="form-group" style="margin-top:10px;">
                    <label class="form-label">Postal Code <span class="required">*</span></label>

                  <div class="app-card-meta-item"><strong>${a.streamCount}</strong> streams</div>
                  <div class="app-card-meta-item">AMS: <strong>${a.amsCommission}%</strong></div>
                  <div class="app-card-meta-item">${a.sellerType}</div>
                </div>
                ${isExpanded ? `
                  <div class="app-card-detail-grid">
                    <div class="app-card-detail"><div class="label">Products Sponsored/Loaned</div><div class="value">${a.numProductsSponsored}</div></div>
                    <div class="app-card-detail"><div class="label">Product Nom. Confirmed</div><div class="value">${String(a.productNominationsConfirmed) === 'true' ? '✓ Yes' : '✗ No'}</div></div>
                    <div class="app-card-detail"><div class="label">Voucher Tier</div><div class="value">${getVoucherTierLabel(a.voucherTier)}</div></div>
                    <div class="app-card-detail"><div class="label">Seller Site Stream Only</div><div class="value">${String(a.sellerSiteRequired) === 'true' ? 'Yes' : 'No'}</div></div>
                    ${String(a.sellerSiteRequired) === 'true' ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Seller Site Address</div><div class="value">${a.sellerSiteAddress ? a.sellerSiteAddress + (a.sellerSitePostalCode ? ', S' +a.sellerSitePostalCode : '') : '—'}</div></div>` : ''}
                    <div class="app-card-detail"><div class="label">Brand Activation</div><div class="value">${String(a.hasPackageActivation) === 'true' ? 'Yes' : 'No'}</div></div>
                    ${String(a.hasPackageActivation) === 'true' ? `<div class="app-card-detail"><div class="label">Brand Activation Type</div><div class="value">${getBrandActivationLabel(a.brandActivationType)}</div></div>` : ''}
                    <div class="app-card-detail"><div class="label">Preferred Date</div><div class="value">${a.preferredDate ? formatDate(a.preferredDate) : 'None'}</div></div>
                    <div class="app-card-detail"><div class="label">PIC</div><div class="value">${a.sellerPicName} (${a.sellerPicMobile})</div></div>
                    <div class="app-card-detail"><div class="label">PIC Email</div><div class="value">${a.sellerPicEmail || '—'}</div></div>
                    <div class="app-card-detail"><div class="label">Brief</div><div class="value">${a.livestreamBrief ? `<a href="${a.livestreamBrief}" target="_blank" style="color:#6c5ce7;text-decoration:underline;">View Brief</a>` : '—'}</div></div>
                  </div>
                ` : ''}
                <button class="expand-btn" onclick="toggleCardExpand('picker-${a.id}')">
                  ${isExpanded ? '▲ Show less' : '▼ Show full details'}
                </button>
              </div>
            `;
          }).join('')}
        </div>
      `;
    };

    // ========================
    // RENDER: Internal Dashboard
    // ========================

    const renderInternalDashboard = () => {
      // Store filtered arrays on state so tab render functions can share them without re-filtering
      state.internalDisplayBrandApps = state.internalShowPast ? state.brandApplications : filterBrandAppsByDisplayWindow(state.brandApplications);
      state.internalDisplayCreatorApps = state.internalShowPast ? state.creatorApplications : filterCreatorAppsByDisplayWindow(state.creatorApplications);
      const displayBrandApps = state.internalDisplayBrandApps;
      const displayCreatorApps = state.internalDisplayCreatorApps;
      const pendingBrandApps = displayBrandApps.filter(a => a.status === 'pending').length;
      const pendingCreatorApps = displayCreatorApps.filter(a => a.status === 'pending').length;
      const confirmedSlots = displayCreatorApps.filter(a => a.status === 'approved').length;

      let tabContentHtml = '';

      if (state.internalTab === 'brand-apps') {
        tabContentHtml = renderInternalBrandApps();
      } else if (state.internalTab === 'creator-apps') {
        tabContentHtml = renderInternalCreatorApps();
      } else if (state.internalTab === 'confirmed-slots') {
        tabContentHtml = renderInternalConfirmedSlots();
      } else if (state.internalTab === 'calendar') {
        tabContentHtml = renderInternalCalendar();
      }

      return `
        <div class="dashboard">
          <div class="dashboard-header">
            <div>
              <h1 class="dashboard-title">Internal Dashboard</h1>
              <p class="dashboard-subtitle">Manage brand and creator applications</p>
            </div>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;">
              <span style="font-size:13px;color:#636e72;">Show Past Months</span>
              <span onclick="handleToggleInternalShowPast()" style="position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;">
                <span style="position:absolute;inset:0;background:${state.internalShowPast ? '#0984e3' : '#ccc'};border-radius:22px;transition:background 0.2s;"></span>
                <span style="position:absolute;top:3px;left:${state.internalShowPast ? '21px' : '3px'};width:16px;height:16px;background:#fff;border-radius:50%;transition:left 0.2s;"></span>
              </span>
            </label>
          </div>

          <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
            <button onclick="startInternalBrandApply()" style="padding:9px 18px;background:#ee4d2d;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">+ Apply on Behalf of Brand</button>
            <button onclick="${state.internalCreatorPickerMode ? 'cancelInternalCreatorPicker()' : 'startInternalCreatorPicker()'}" style="padding:9px 18px;background:${state.internalCreatorPickerMode ? '#636e72' : '#6c5ce7'};color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">${state.internalCreatorPickerMode ? '✕ Cancel' : '+ Apply on Behalf of Creator'}</button>
            <button onclick="state.internalPinResetMode = !state.internalPinResetMode; state.internalPinResetSearch = ''; render();" style="padding:9px 18px;background:${state.internalPinResetMode ? '#636e72' : '#b2bec3'};color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">${state.internalPinResetMode ? '✕ Cancel' : 'Reset User\'s PIN'}</button>
          </div>

          ${(() => {
            if (!state.internalPinResetMode) return '';
            const searchVal = state.internalPinResetSearch.toLowerCase();
            const isBrand = state.internalPinResetUserType === 'brand';
            const list = isBrand
              ? state.brands.filter(b => !searchVal || b.name?.toLowerCase().includes(searchVal) || String(b.id).toLowerCase().includes(searchVal))
              : state.creators.filter(c => !searchVal || c.name?.toLowerCase().includes(searchVal) || String(c.id).toLowerCase().includes(searchVal));
            return `
              <div style="background:#f8f9fa;border:1px solid #dfe6e9;border-radius:12px;padding:20px;margin-bottom:24px;">
                <div style="font-size:14px;font-weight:600;color:#636e72;margin-bottom:16px;">Reset User's PIN</div>
                <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
                  <button onclick="state.internalPinResetUserType='brand'; state.internalPinResetSearch=''; render();"
                    style="padding:6px 16px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:${isBrand ? '#636e72' : '#ecf0f1'};color:${isBrand ? '#fff' : '#636e72'};">Brand</button>
                  <button onclick="state.internalPinResetUserType='creator'; state.internalPinResetSearch=''; render();"
                    style="padding:6px 16px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:${!isBrand ? '#636e72' : '#ecf0f1'};color:${!isBrand ? '#fff' : '#636e72'};">Creator</button>
                  <input type="text" id="pin-reset-search" placeholder="Search by name or ID…" value="${escapeHtml(state.internalPinResetSearch)}"
                    oninput="state.internalPinResetSearch = this.value; const _p = this.selectionStart; render(); const _el = document.getElementById('pin-reset-search'); if(_el){_el.focus();_el.setSelectionRange(_p,_p);}"
                    style="flex:1;min-width:180px;padding:7px 12px;border:1px solid #dfe6e9;border-radius:6px;font-size:13px;">
                </div>
                ${list.length === 0 ? `<div style="font-size:13px;color:#999;">${searchVal ? 'No results found.' : 'Start typing to search.'}</div>` : `
                  <div style="display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;">
                    ${list.slice(0, 50).map(u => `
                      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border:1px solid #dfe6e9;border-radius:8px;font-size:13px;">
                        <div>
                          <span style="font-weight:600;">${escapeHtml(u.name || '—')}</span>
                          <span style="color:#999;margin-left:8px;">${escapeHtml(String(u.id))}</span>
                        </div>
                        <button onclick="state.pinResetModal = { show: true, userId: '${escapeHtml(String(u.id))}', userName: '${escapeHtml(u.name || '')}', userType: '${isBrand ? 'brand' : 'creator'}' }; render();"
                          style="padding:5px 12px;background:#b2bec3;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">Reset PIN</button>
                      </div>
                    `).join('')}
                  </div>
                `}
              </div>
            `;
          })()}

          ${(() => {
            if (!state.internalCreatorPickerMode) return '';
            const currentMonth = getCurrentMonthStr();
            const approvedUpcoming = state.brandApplications.filter(a =>
              a.status === 'approved' &&
              String(a.month) >= currentMonth &&
              countTakenSlots(a.id) < parseInt(a.streamCount)
            );
            const shopMap = new Map();
            approvedUpcoming.forEach(a => { if (!shopMap.has(a.shopId)) shopMap.set(a.shopId, a.shopName); });
            const shops = [...shopMap.entries()].sort((a, b) => (a[1] || '').localeCompare(b[1] || ''));
            const sortedCreators = [...state.creators].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            return `
              <div style="background:#f5f3ff;border:1px solid #d0c7f8;border-radius:12px;padding:20px;margin-bottom:24px;">
                <div style="font-size:14px;font-weight:600;color:#6c5ce7;margin-bottom:16px;">Apply on Behalf of Creator</div>
                <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
                  <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
                    <label class="form-label">Shop</label>
                    <select class="form-select" onchange="handleInternalCreatorPickerShopSelect(this.value)">
                      <option value="">— Select shop —</option>
                      ${shops.map(([id, name]) => `<option value="${id}" ${state.internalCreatorPickerShopId === id ? 'selected' : ''}>${name} (${id})</option>`).join('')}
                    </select>
                    ${approvedUpcoming.length === 0 ? '<div style="font-size:12px;color:#999;margin-top:6px;">No upcoming approved brand applications found.</div>' : ''}
                  </div>
                  <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
                    <label class="form-label">Creator</label>
                    <select class="form-select" onchange="state.internalSelectedCreatorId = this.value; render();">
                      <option value="">— Select creator —</option>
                      ${sortedCreators.map(c => `<option value="${c.id}" ${state.internalSelectedCreatorId === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                    </select>
                  </div>
                  <button onclick="(() => { if (!state.internalCreatorPickerShopId) { showNotification('Please select a shop', 'error'); return; } if (!state.internalSelectedCreatorId) { showNotification('Please select a creator', 'error'); return; } state.internalCreatorPickerMode = false; state.internalBrandPickerListMode = true; render(); })()" style="padding:9px 18px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;align-self:flex-end;">Continue →</button>
                </div>
              </div>
            `;
          })()}

          <div class="stats-grid" style="margin-bottom:32px;">
            <div class="stat-card" style="cursor:pointer;transition:all 0.2s;${state.internalTab === 'brand-apps' ? 'border-top-color:#e67e22;background:#fff8f0;box-shadow:0 4px 16px rgba(230,126,34,0.15);' : 'border-top-color:#ddd;'}"
              onclick="switchInternalTab('brand-apps');">
              <div class="stat-value" style="color:#e67e22;">${pendingBrandApps}</div>
              <div class="stat-label">Brand Applications Pending Approval</div>
            </div>
            <div class="stat-card" style="cursor:pointer;transition:all 0.2s;${state.internalTab === 'creator-apps' ? 'border-top-color:#e67e22;background:#fff8f0;box-shadow:0 4px 16px rgba(230,126,34,0.15);' : 'border-top-color:#ddd;'}"
              onclick="switchInternalTab('creator-apps');">
              <div class="stat-value" style="color:#e67e22;">${pendingCreatorApps}</div>
              <div class="stat-label">Creator Applications Pending Approval</div>
            </div>
            <div class="stat-card" style="cursor:pointer;transition:all 0.2s;${state.internalTab === 'confirmed-slots' ? 'border-top-color:#27ae60;background:#f0faf4;box-shadow:0 4px 16px rgba(39,174,96,0.15);' : 'border-top-color:#ddd;'}"
              onclick="switchInternalTab('confirmed-slots');">
              <div class="stat-value" style="color:#27ae60;">${confirmedSlots}</div>
              <div class="stat-label">Confirmed Slots</div>
            </div>
            <div class="stat-card" style="cursor:pointer;transition:all 0.2s;${state.internalTab === 'calendar' ? 'border-top-color:#EE4D2D;background:#fff1ed;box-shadow:0 4px 16px rgba(238,77,45,0.15);' : 'border-top-color:#ddd;'}"
              onclick="switchInternalTab('calendar');">
              <div class="stat-value" style="color:#EE4D2D;">📅</div>
              <div class="stat-label">Calendar View</div>
            </div>
          </div>

          ${tabContentHtml}
        </div>
      `;
    };

    // Internal: Brand Applications
    const renderInternalBrandApps = () => {
      const all = state.internalDisplayBrandApps || filterBrandAppsByDisplayWindow(state.brandApplications);
      const sf = state.brandAppStatusFilter;
      let filtered = sf ? all.filter(a => a.status === sf) : all;

      const statusCounts = { pending: 0, approved: 0, rejected: 0, cancelled: 0 };
      all.forEach(a => { if (statusCounts[a.status] !== undefined) statusCounts[a.status]++; });

      const f = state.brandAppsFilters;
      const categories = [...new Set(filtered.map(a => a.sellerType).filter(Boolean))].sort();
      const months = [...new Set(filtered.map(a => a.month).filter(Boolean))].sort();
      const hasFilters = f.shopName || f.category || f.month || f.rm;

      // Apply search filters
      if (f.shopName) filtered = filtered.filter(a => a.shopName.toLowerCase().includes(f.shopName.toLowerCase()));
      if (f.category) filtered = filtered.filter(a => a.sellerType === f.category);
      if (f.month) filtered = filtered.filter(a => a.month === f.month);
      if (f.rm) filtered = filtered.filter(a => getRmForShop(a.shopId).toLowerCase().includes(f.rm.toLowerCase()));

      const filterBar = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
          <label style="font-size:13px;color:#888;white-space:nowrap;">Status:</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${[['pending','Pending'],['approved','Approved'],['rejected','Rejected'],['cancelled','Cancelled'],['','All']].map(([val, label]) => `
              <button onclick="state.brandAppStatusFilter = '${val}'; render();"
                class="status-filter-pill"
                style="padding:5px 14px;border-radius:20px;border:1px solid ${sf === val ? '#6c5ce7' : '#ddd'};background:${sf === val ? '#6c5ce7' : '#fff'};color:${sf === val ? '#fff' : '#555'};font-size:13px;cursor:pointer;font-weight:${sf === val ? '600' : '400'};">
                ${label}${val ? ` (${statusCounts[val] || 0})` : ` (${all.length})`}
              </button>
            `).join('')}
          </div>
        </div>
        <div style="background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #eee;">
          <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:12px;">Filters</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Shop Name</label>
              <input type="text" id="baf-shop" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" placeholder="Search shop..." value="${f.shopName}"
                onkeydown="if(event.key==='Enter') applyBrandAppsFilters();">
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Category</label>
              <select id="baf-category" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;">
                <option value="">All Categories</option>
                ${categories.map(c => `<option value="${c}" ${f.category === c ? 'selected' : ''}>${c}</option>`).join('')}
              </select>
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Stream Month</label>
              <select id="baf-month" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;">
                <option value="">All Months</option>
                ${months.map(m => `<option value="${m}" ${f.month === m ? 'selected' : ''}>${formatMonth(m)}</option>`).join('')}
              </select>
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">RM</label>
              <input type="text" id="baf-rm" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" placeholder="Search RM..." value="${f.rm}"
                onkeydown="if(event.key==='Enter') applyBrandAppsFilters();">
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn-primary" style="font-size:13px;padding:8px 20px;" onclick="applyBrandAppsFilters();">Search</button>
            ${hasFilters ? `<button class="btn-secondary" style="font-size:13px;padding:8px 16px;"
              onclick="state.brandAppsFilters = { shopName:'', category:'', month:'', rm:'' }; render();">
              Clear Filters
            </button>` : ''}
          </div>
        </div>
      `;

      if (all.length === 0) {
        return filterBar + `<div class="empty-state"><p style="color:#888;">No brand applications yet</p></div>`;
      }
      if (filtered.length === 0) {
        return filterBar + `<div class="empty-state"><p style="color:#888;">No ${sf} applications match filters</p></div>`;
      }

      const sorted = [...filtered].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      return filterBar + sorted.map(app => {
        const isExpanded = state.expandedCards['int-' + app.id];
        return `
          <div class="app-card">
            <div class="app-card-header">
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                  <div class="app-card-title">🏪 ${app.shopName}</div>
                  ${(() => {
                    const status = getManagedSellerStatus(app.shopId);
                    const isManaged = status === 'Managed Seller';
                    return `<span style="display:inline-block;padding:4px 10px;background:${isManaged ? '#d4edda' : '#f8d7da'};border-radius:6px;font-size:11px;color:${isManaged ? '#155724' : '#721c24'};font-weight:600;white-space:nowrap;">${status}</span>`;
                  })()}
                </div>
                <div style="font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;margin-bottom:4px;">BA ID: ${app.id}</div>
                <div style="font-size:12px;color:#666;">Submitted ${formatDate(app.createdAt)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end;">
                <div style="text-align:right;">
                  <span class="status-badge status-${app.status}">${app.status}</span>
                  ${app.status === 'cancelled' && app.cancelledAt ? `<div style="font-size:11px;color:#aaa;margin-top:4px;">${new Date(app.cancelledAt).toLocaleDateString('en-SG', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}</div>` : ''}
                  ${String(app.isPaused) === 'true' ? `<div style="margin-top:4px;display:inline-block;padding:2px 8px;background:#fff8e1;border:1px solid #ffe082;border-radius:10px;font-size:11px;font-weight:600;color:#e67e22;">⏸ Brand Application Paused</div>` : ''}
                </div>
                ${app.status === 'pending' ? `
                  <div class="action-btns">
                    <button class="action-btn btn-approve" onclick="handleApproveBrandApp('${app.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;"' : ''}>Approve</button>
                    <button class="action-btn btn-reject" onclick="handleRejectBrandApp('${app.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;"' : ''}>Reject</button>
                  </div>
                ` : ''}
                ${app.status === 'approved' ? `
                  <button onclick="handleToggleBrandPause('${app.id}')"
                    style="background:none;border:1px solid ${String(app.isPaused) === 'true' ? '#27ae60' : '#e67e22'};border-radius:6px;padding:5px 12px;font-size:12px;color:${String(app.isPaused) === 'true' ? '#27ae60' : '#e67e22'};cursor:pointer;font-weight:500;"
                    ${state.isSubmitting ? 'disabled' : ''}>
                    ${String(app.isPaused) === 'true' ? 'Resume' : 'Pause'}
                  </button>
                ` : ''}
                ${app.status !== 'rejected' && app.status !== 'cancelled' ? `
                  <button onclick="handleCancelBrandApp('${app.id}')" style="background:none;border:1px solid #e74c3c;border-radius:6px;padding:5px 12px;font-size:12px;color:#e74c3c;cursor:pointer;font-weight:500;" ${state.isSubmitting ? 'disabled' : ''}>Cancel</button>
                ` : ''}
              </div>
            </div>
            <div class="app-card-meta">
              <div class="app-card-meta-item">Shop ID: <strong>${app.shopId}</strong></div>
              <div class="app-card-meta-item">RM: <strong>${getRmForShop(app.shopId)}</strong></div>
              <div class="app-card-meta-item">Month: <strong>${formatMonth(app.month)}</strong></div>
              <div class="app-card-meta-item"><strong>${app.streamCount}</strong> streams</div>
              <div class="app-card-meta-item">AMS: <strong>${app.amsCommission}%</strong></div>
              <div class="app-card-meta-item">${app.sellerType}</div>
            </div>
            ${app.status === 'rejected' && app.rejectionReason ? `<div style="margin-top:8px;padding:8px 12px;background:#ffebee;border-radius:6px;font-size:13px;color:#e74c3c;"><strong>Rejection Reason:</strong> ${app.rejectionReason}</div>` : ''}
            ${isExpanded ? `
              <div class="app-card-detail-grid">
                ${app.status === 'cancelled' && app.cancelReason ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Cancellation Reason</div><div class="value" style="color:#e74c3c;">${app.cancelReason}</div></div>` : ''}
                <div class="app-card-detail"><div class="label">Products Sponsored/Loaned</div><div class="value">${app.numProductsSponsored}</div></div>
                <div class="app-card-detail"><div class="label">Product Nom. Confirmed</div><div class="value">${String(app.productNominationsConfirmed) === 'true' ? '✓ Yes' : '✗ No'}</div></div>
                <div class="app-card-detail"><div class="label">Voucher Tier</div><div class="value">${getVoucherTierLabel(app.voucherTier)}</div></div>
                <div class="app-card-detail"><div class="label">Seller Site Stream Only</div><div class="value">${String(app.sellerSiteRequired) === 'true' ? 'Yes' : 'No'}</div></div>
                ${String(app.sellerSiteRequired) === 'true' ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Seller Site Address</div><div class="value">${app.sellerSiteAddress ? app.sellerSiteAddress + (app.sellerSitePostalCode ? ', S' +app.sellerSitePostalCode : '') : '—'}</div></div>` : ''}
                ${String(app.sellerSiteRequired) === 'true' && Array.isArray(app.sellerSiteTimeslots) && app.sellerSiteTimeslots.length > 0 ? `
                  <div class="app-card-detail" style="grid-column:1/-1;">
                    <div class="label">Seller Site Timeslots</div>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
                      ${app.sellerSiteTimeslots.map(s => `<span style="display:inline-block;padding:4px 10px;background:#fff0f0;border:1px solid #fcddd4;border-radius:16px;font-size:12px;color:#333;">📅 ${formatDate(s.date)} · ${formatTime(s.startTime)}–${formatTime(s.endTime)}</span>`).join('')}
                    </div>
                  </div>
                ` : ''}
                <div class="app-card-detail"><div class="label">Brand Activation</div><div class="value">${String(app.hasPackageActivation) === 'true' ? 'Yes' : 'No'}</div></div>
                ${String(app.hasPackageActivation) === 'true' ? `<div class="app-card-detail"><div class="label">Brand Activation Type</div><div class="value">${getBrandActivationLabel(app.brandActivationType)}</div></div>` : ''}
                <div class="app-card-detail"><div class="label">Preferred Date</div><div class="value">${app.preferredDate ? formatDate(app.preferredDate) : 'None'}</div></div>
                <div class="app-card-detail"><div class="label">PIC</div><div class="value">${app.sellerPicName} (${app.sellerPicMobile})</div></div>
                <div class="app-card-detail"><div class="label">PIC Email</div><div class="value">${app.sellerPicEmail || '—'}</div></div>
                <div class="app-card-detail"><div class="label">Brief</div><div class="value">${app.livestreamBrief ? `<a href="${app.livestreamBrief}" target="_blank" style="color:#6c5ce7;text-decoration:underline;">View Brief</a>` : '—'}</div></div>
              </div>
            ` : ''}
            <button class="expand-btn" onclick="toggleCardExpand('int-${app.id}')">
              ${isExpanded ? '▲ Show less' : '▼ Show full details'}
            </button>
          </div>
        `;
      }).join('');
    };

    // Internal: Creator Applications (one card per row)
    const renderInternalCreatorApps = () => {
      const all = state.internalDisplayCreatorApps || filterCreatorAppsByDisplayWindow(state.creatorApplications);
      const sf = state.creatorAppStatusFilter;
      let filtered = sf ? all.filter(a => a.status === sf) : all;

      const approvedCount = all.filter(a => a.status === 'approved').length;
      const statusCounts = { pending: 0, rejected: 0, cancelled: 0 };
      all.forEach(a => { if (statusCounts[a.status] !== undefined) statusCounts[a.status]++; });

      const f = state.creatorAppsFilters;
      const categories = [...new Set(filtered.map(a => state.brandApplications.find(ba => ba.id === a.brandApplicationId)?.sellerType).filter(Boolean))].sort();
      const months = [...new Set(filtered.map(a => state.brandApplications.find(ba => ba.id === a.brandApplicationId)?.month).filter(Boolean))].sort();
      const hasFilters = f.creatorUsername || f.category || f.month || f.rm;

      // Apply search filters
      if (f.creatorUsername) filtered = filtered.filter(a => (a.affiliateUsername || a.creatorName).toLowerCase().includes(f.creatorUsername.toLowerCase()));
      if (f.category) {
        filtered = filtered.filter(a => {
          const brandApp = state.brandApplications.find(ba => ba.id === a.brandApplicationId);
          return brandApp?.sellerType === f.category;
        });
      }
      if (f.month) {
        filtered = filtered.filter(a => {
          const brandApp = state.brandApplications.find(ba => ba.id === a.brandApplicationId);
          return brandApp?.month === f.month;
        });
      }
      if (f.rm) {
        filtered = filtered.filter(a => {
          const brandApp = state.brandApplications.find(ba => ba.id === a.brandApplicationId);
          return getRmForShop(brandApp?.shopId).toLowerCase().includes(f.rm.toLowerCase());
        });
      }

      const filterBar = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
          <label style="font-size:13px;color:#888;white-space:nowrap;">Status:</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${[['pending','Pending'],['approved','Approved'],['rejected','Rejected'],['cancelled','Cancelled'],['','All']].map(([val, label]) => `
              <button onclick="state.creatorAppStatusFilter = '${val}'; render();"
                class="status-filter-pill"
                style="padding:5px 14px;border-radius:20px;border:1px solid ${sf === val ? '#6c5ce7' : '#ddd'};background:${sf === val ? '#6c5ce7' : '#fff'};color:${sf === val ? '#fff' : '#555'};font-size:13px;cursor:pointer;font-weight:${sf === val ? '600' : '400'};">
                ${label} (${val === 'approved' ? approvedCount : val ? (statusCounts[val] || 0) : all.length})
              </button>
            `).join('')}
          </div>
        </div>
        <div style="background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #eee;">
          <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:12px;">Filters</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Creator Username</label>
              <input type="text" id="caf-creator" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" placeholder="Search creator..." value="${f.creatorUsername}"
                onkeydown="if(event.key==='Enter') applyCreatorAppsFilters();">
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Category</label>
              <select id="caf-category" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;">
                <option value="">All Categories</option>
                ${categories.map(c => `<option value="${c}" ${f.category === c ? 'selected' : ''}>${c}</option>`).join('')}
              </select>
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Stream Month</label>
              <select id="caf-month" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;">
                <option value="">All Months</option>
                ${months.map(m => `<option value="${m}" ${f.month === m ? 'selected' : ''}>${formatMonth(m)}</option>`).join('')}
              </select>
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">RM</label>
              <input type="text" id="caf-rm" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" placeholder="Search RM..." value="${f.rm}"
                onkeydown="if(event.key==='Enter') applyCreatorAppsFilters();">
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn-primary" style="font-size:13px;padding:8px 20px;" onclick="applyCreatorAppsFilters();">Search</button>
            ${hasFilters ? `<button class="btn-secondary" style="font-size:13px;padding:8px 16px;"
              onclick="state.creatorAppsFilters = { creatorUsername:'', category:'', month:'', rm:'' }; render();">
              Clear Filters
            </button>` : ''}
          </div>
        </div>
      `;

      if (all.length === 0) {
        return filterBar + `<div class="empty-state"><p style="color:#888;">No creator applications yet</p></div>`;
      }
      if (filtered.length === 0) {
        return filterBar + `<div class="empty-state"><p style="color:#888;">No ${sf || 'matching'} applications match filters</p></div>`;
      }

      const rows = [...filtered].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      return filterBar + rows.map(row => {
        const brandApp = state.brandApplications.find(ba => ba.id === row.brandApplicationId);
        const rm = getRmForShop(brandApp?.shopId);
        const isExpanded = state.expandedCards['ca-details-' + row.id];
        const phoneParsed = parseStoredPhone(row.phone);
        const displayPhone = '+' + phoneParsed.code + ' ' + phoneParsed.number;
        const slotsLeft = brandApp ? (brandApp.streamCount - countTakenSlots(brandApp.id)) : 0;
        const pendingOrApprovedCount = countPendingOrApprovedApps(row.brandApplicationId);
        return `
          <div class="app-card creator-app">
            <div class="app-card-header">
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
                  <div class="app-card-title">🏪 ${row.brandName || row.shopName}</div>
                  <span style="color:#ddd;font-weight:400;">•</span>
                  <div style="font-size:16px;font-weight:500;color:#666;">🎬 ${row.creatorName}</div>
                  ${(() => {
                    const affStatus = getManagedAffiliateStatus(row.creatorId);
                    const isApproved = affStatus === 'Approved Affiliate';
