                <div style="font-size:12px;color:#888;display:flex;gap:16px;flex-wrap:wrap;">
                  <span>📊 ${slotsLeft}/${brandApp?.streamCount || 0} slots left</span>
                  <span>⏳ ${pendingOrApprovedCount} creator application${pendingOrApprovedCount !== 1 ? 's' : ''} pending review</span>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;">
                <span class="status-badge status-${row.status}">${row.status}</span>
                ${row.status === 'pending' ? `
                  <div class="action-btns">
                    <button class="action-btn btn-approve" onclick="handleApproveCreatorApp('${row.id}')" ${state.isSubmitting || slotsLeft === 0 ? 'disabled style="opacity:0.5;"' : ''}>Approve</button>
                    <button class="action-btn btn-reject" onclick="handleRejectCreatorApp('${row.id}')" ${state.isSubmitting ? 'disabled style="opacity:0.5;"' : ''}>Reject</button>
                  </div>
                ` : ''}
              </div>
            </div>
            <div class="app-card-meta">
              <div class="app-card-meta-item">Shop ID: <strong>${brandApp?.shopId || '—'}</strong></div>
              <div class="app-card-meta-item">RM: <strong>${rm}</strong></div>
              <div class="app-card-meta-item">Category: <strong>${brandApp?.sellerType || '—'}</strong></div>
              <div class="app-card-meta-item">Stream Month: <strong>${formatMonth(brandApp?.month)}</strong></div>
            </div>
            ${row.status === 'rejected' && row.rejectionReason ? `<div style="margin-top:8px;padding:8px 12px;background:#ffebee;border-radius:6px;font-size:13px;color:#e74c3c;"><strong>Rejection Reason:</strong> ${row.rejectionReason}</div>` : ''}
            <div class="app-card-detail-grid" style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;">
              <div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Stream Date & Time</div><div class="value" style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;"><span class="stream-date-pill" style="display:inline-block;padding:5px 12px;background:#f0f0ff;border-radius:6px;font-size:13px;color:#6c5ce7;font-weight:600;">📅 ${formatDate(row.streamDate)} ${formatTime(row.streamTime)}${row.streamEndTime ? ' – ' + (row.streamEndDate && row.streamEndDate !== row.streamDate ? formatDate(row.streamEndDate) + ' ' : '') + formatTime(row.streamEndTime) : ''}</span>${String(row.hasSamples) === 'true' ? '<span style="display:inline-block;padding:4px 10px;background:#e8f4f8;color:#2980b9;border-radius:6px;font-size:12px;font-weight:600;">📦 Has Existing Samples</span>' : ''}</div></div>
            </div>
            <div style="margin-top:8px;">
              <span style="font-size:13px;color:#888;cursor:pointer;text-decoration:underline;text-underline-offset:3px;" onclick="state.expandedCards['ca-details-${row.id}'] = !state.expandedCards['ca-details-${row.id}']; render();">
                ${isExpanded ? 'Hide Details ▲' : 'View Details ▼'}
              </span>
            </div>
            ${isExpanded ? `
              <div style="margin-top:12px;padding:12px;background:#fff8f0;border-radius:8px;border:1px solid #fcddd4;">
                <div style="font-size:12px;font-weight:700;color:#e67e22;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Brand Application</div>
                <div class="app-card-detail-grid">
                  <div class="app-card-detail"><div class="label">Stream Location</div><div class="value">${brandApp?.streamLocation || '—'}</div></div>
                  ${(String(brandApp?.sellerSiteRequired) === 'true' || String(brandApp?.streamLocation).trim().toLowerCase() === 'seller site') ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Seller Site Address</div><div class="value">${brandApp?.sellerSiteAddress ? brandApp.sellerSiteAddress + (brandApp.sellerSitePostalCode ? ', S' +brandApp.sellerSitePostalCode : '') : '—'}</div></div>` : ''}
                  <div class="app-card-detail"><div class="label">AMS Commission</div><div class="value">${brandApp?.amsCommission ? brandApp.amsCommission + '%' : '—'}</div></div>
                  <div class="app-card-detail"><div class="label">Products Sponsored/Loaned</div><div class="value">${brandApp?.numProductsSponsored || '—'}</div></div>
                  <div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Voucher Tier</div><div class="value">${getVoucherTierLabel(brandApp?.voucherTier)}</div></div>
                  <div class="app-card-detail"><div class="label">Brand Activation</div><div class="value">${String(brandApp?.hasPackageActivation) === 'true' ? 'Yes' : 'No'}</div></div>
                  ${String(brandApp?.hasPackageActivation) === 'true' ? `<div class="app-card-detail"><div class="label">Brand Activation Type</div><div class="value">${getBrandActivationLabel(brandApp?.brandActivationType)}</div></div>` : ''}
                  <div class="app-card-detail"><div class="label">Preferred Date</div><div class="value">${brandApp?.preferredDate ? formatDate(brandApp.preferredDate) : '—'}</div></div>
                  <div class="app-card-detail"><div class="label">Seller PIC</div><div class="value">${brandApp?.sellerPicName || '—'}${brandApp?.sellerPicMobile ? ' · ' + brandApp.sellerPicMobile : ''}</div></div>
                  <div class="app-card-detail"><div class="label">Seller PIC Email</div><div class="value">${brandApp?.sellerPicEmail || '—'}</div></div>
                  ${brandApp?.livestreamBrief ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Livestream Brief</div><div class="value"><a href="${brandApp.livestreamBrief}" target="_blank" style="color:#6c5ce7;text-decoration:underline;">View Brief</a></div></div>` : ''}
                </div>
              </div>
              <div style="margin-top:8px;padding:12px;background:#f0faf4;border-radius:8px;border:1px solid #c3e6cb;">
                <div style="font-size:12px;font-weight:700;color:#27ae60;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Creator Application</div>
                <div class="app-card-detail-grid">
                  <div class="app-card-detail"><div class="label">Creator Telegram</div><div class="value">${row.telegram || '—'}</div></div>
                  <div class="app-card-detail"><div class="label">Creator Mobile</div><div class="value">${displayPhone}</div></div>
                  ${row.shippingRecipientName ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Shipping Recipient Name</div><div class="value">${row.shippingRecipientName}</div></div>` : ''}
                  <div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Creator Shipping Address</div><div class="value">${row.shippingAddress ? row.shippingAddress + (row.shippingPostalCode ? ', S' +row.shippingPostalCode : '') : '—'}</div></div>
                  ${row.deliveryInstructions ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Delivery Instructions</div><div class="value">${row.deliveryInstructions}</div></div>` : ''}
                  <div class="app-card-detail"><div class="label">Willing to Travel to Seller Site</div><div class="value">${String(row.willingToTravel) === 'true' ? 'Yes' : 'No'}</div></div>
                  ${row.status === 'cancelled' && row.cancelReason ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Cancellation Reason</div><div class="value" style="color:#e74c3c;">${row.cancelReason}</div></div>` : ''}
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    };

    // Internal: Confirmed Slots
    const renderInternalConfirmedSlots = () => {
      const f = state.confirmedSlotsFilters;

      // Expand approved (confirmed) creator applications to individual timeslots
      const allSlots = [];
      state.creatorApplications.filter(ca => ca.status === 'approved').forEach(ca => {
        const brandApp = state.brandApplications.find(ba => ba.id === ca.brandApplicationId);
        const rm = getRmForShop(brandApp?.shopId);
        getTimeslots(ca).forEach(slot => {
          allSlots.push({
            caId: ca.id,
            date: slot.date,
            startTime: slot.startTime,
            endDate: slot.endDate || slot.date,
            endTime: slot.endTime,
            creatorName: ca.creatorName,
            affiliateUsername: ca.affiliateUsername || '',
            phone: ca.phone || '',
            telegram: ca.telegram || '',
            shippingAddress: ca.shippingAddress || '',
            shippingPostalCode: ca.shippingPostalCode || '',
            shippingRecipientName: ca.shippingRecipientName || '',
            shopName: brandApp?.shopName || ca.shopName || ca.brandName || '—',
            shopId: brandApp?.shopId || '',
            category: brandApp?.sellerType || '—',
            month: brandApp?.month || '',
            rm,
            streamLocation: brandApp?.streamLocation || '',
            sellerSiteRequired: brandApp?.sellerSiteRequired || '',
            sellerSiteAddress: brandApp?.sellerSiteAddress || '',
            sellerSitePostalCode: brandApp?.sellerSitePostalCode || '',
            sellerPdpaConsentGiven: brandApp?.sellerPdpaConsentGiven || '',
            loanedProductReturnCostsAgreed: brandApp?.loanedProductReturnCostsAgreed || '',
            amsCommission: brandApp?.amsCommission || '',
            numProductsSponsored: brandApp?.numProductsSponsored || '',
            voucherTier: brandApp?.voucherTier || '',
            hasPackageActivation: brandApp?.hasPackageActivation || '',
            brandActivationType: brandApp?.brandActivationType || '',
            preferredDate: brandApp?.preferredDate || '',
            sellerPicName: brandApp?.sellerPicName || '',
            sellerPicMobile: brandApp?.sellerPicMobile || '',
            sellerPicEmail: brandApp?.sellerPicEmail || '',
            livestreamBrief: brandApp?.livestreamBrief || '',
            sampleSentAt: ca.sampleSentAt || '',
            sampleReceivedAt: ca.sampleReceivedAt || '',
            courier: ca.courier || '',
            trackingId: ca.trackingId || '',
            deliveryInstructions: ca.deliveryInstructions || '',
          });
        });
      });

      // Apply filters
      let filtered = allSlots;
      if (f.shopName) filtered = filtered.filter(s => s.shopName.toLowerCase().includes(f.shopName.toLowerCase()));
      if (f.creatorUsername) filtered = filtered.filter(s => (s.affiliateUsername || s.creatorName).toLowerCase().includes(f.creatorUsername.toLowerCase()));
      if (f.category) filtered = filtered.filter(s => s.category === f.category);
      if (f.dateFrom) filtered = filtered.filter(s => s.date >= f.dateFrom);
      if (f.dateTo) filtered = filtered.filter(s => s.date <= f.dateTo);
      if (f.month) filtered = filtered.filter(s => s.month === f.month);
      if (f.rm) filtered = filtered.filter(s => s.rm.toLowerCase().includes(f.rm.toLowerCase()));

      filtered.sort((a, b) => (a.date + (a.startTime || '')).localeCompare(b.date + (b.startTime || '')));

      const categories = [...new Set(allSlots.map(s => s.category).filter(c => c && c !== '—'))].sort();
      const months = [...new Set(allSlots.map(s => s.month).filter(Boolean))].sort();
      const hasFilters = f.shopName || f.creatorUsername || f.category || f.dateFrom || f.dateTo || f.month || f.rm;

      return `
        <div style="background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #eee;">
          <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:12px;">Filters</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Shop Name</label>
              <input type="text" id="csf-shop" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" placeholder="Search shop..." value="${f.shopName}"
                onkeydown="if(event.key==='Enter') applyConfirmedSlotsFilters();">
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Creator Username</label>
              <input type="text" id="csf-creator" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" placeholder="Search creator..." value="${f.creatorUsername}"
                onkeydown="if(event.key==='Enter') applyConfirmedSlotsFilters();">
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Category</label>
              <select id="csf-category" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;">
                <option value="">All Categories</option>
                ${categories.map(c => `<option value="${c}" ${f.category === c ? 'selected' : ''}>${c}</option>`).join('')}
              </select>
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Stream Month</label>
              <select id="csf-month" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;">
                <option value="">All Months</option>
                ${months.map(m => `<option value="${m}" ${f.month === m ? 'selected' : ''}>${formatMonth(m)}</option>`).join('')}
              </select>
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Stream Date From</label>
              <input type="date" id="csf-date-from" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" value="${f.dateFrom}">
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">Stream Date To</label>
              <input type="date" id="csf-date-to" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" value="${f.dateTo}">
            </div>
            <div style="min-width:0;">
              <label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">RM</label>
              <input type="text" id="csf-rm" class="form-input" style="font-size:13px;padding:8px 12px;width:100%;" placeholder="Search RM..." value="${f.rm}"
                onkeydown="if(event.key==='Enter') applyConfirmedSlotsFilters();">
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn-primary" style="font-size:13px;padding:8px 20px;" onclick="applyConfirmedSlotsFilters();">Search</button>
            ${hasFilters ? `<button class="btn-secondary" style="font-size:13px;padding:8px 16px;"
              onclick="state.confirmedSlotsFilters = { shopName:'', creatorUsername:'', category:'', dateFrom:'', dateTo:'', month:'', rm:'' }; render();">
              Clear Filters
            </button>` : ''}
          </div>
        </div>

        ${filtered.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">✅</div>
            <h3 class="empty-title">${allSlots.length > 0 ? 'No slots match filters' : 'No confirmed slots yet'}</h3>
            <p class="empty-text">${allSlots.length > 0 ? 'Try adjusting your filters' : 'Slots will appear here once creators confirm'}</p>
          </div>
        ` : `
          <div style="font-size:13px;color:#888;margin-bottom:12px;">${filtered.length} slot${filtered.length !== 1 ? 's' : ''} found</div>
          ${filtered.map((s, idx) => {
            const cardKey = 'ics-' + idx;
            const isExpanded = state.expandedCards[cardKey];
            return `
            <div class="app-card" style="border-left-color:#27ae60;">
              <div class="app-card-header">
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
                    <div class="app-card-title">🏪 ${s.shopName}</div>
                    <span style="color:#ddd;font-weight:400;">•</span>
                    <div style="font-size:16px;font-weight:500;color:#666;">🎬 ${s.creatorName}</div>
                  </div>
                  <div style="font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">CA ID: ${s.caId}</div>
                </div>
                <span class="status-badge status-approved">Approved</span>
              </div>
              <div class="app-card-meta">
                <div class="app-card-meta-item">Shop ID: <strong>${s.shopId || '—'}</strong></div>
                <div class="app-card-meta-item">RM: <strong>${s.rm}</strong></div>
                <div class="app-card-meta-item">Category: <strong>${s.category}</strong></div>
                <div class="app-card-meta-item">Stream Month: <strong>${formatMonth(s.month)}</strong></div>
              </div>
              <div class="app-card-detail-grid" style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;">
                <div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Stream Date & Time</div><div class="value"><span class="stream-date-pill" style="display:inline-block;padding:5px 12px;background:#f0f0ff;border-radius:6px;font-size:13px;color:#6c5ce7;font-weight:600;">📅 ${formatDate(s.date)} ${formatTime(s.startTime)}${s.endTime ? ' – ' + (s.endDate !== s.date ? formatDate(s.endDate) + ' ' : '') + formatTime(s.endTime) : ''}</span></div></div>
              </div>
              <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:10px;">
                ${s.sampleReceivedAt
                  ? `<span style="background:#e3f2fd;color:#1565c0;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;">📬 Sample Received — ${new Date(s.sampleReceivedAt).toLocaleDateString('en-SG', { day:'numeric', month:'short', year:'numeric' })}</span>`
                  : s.sampleSentAt
                    ? `<span style="background:#fff8e1;color:#e65100;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;">📦 Sample Sent — ${new Date(s.sampleSentAt).toLocaleDateString('en-SG', { day:'numeric', month:'short', year:'numeric' })} · Awaiting creator confirmation</span>`
                    : `<span style="background:#f5f5f5;color:#888;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;">⏳ Sample Not Yet Sent</span>`
                }
              </div>
              ${s.sampleSentAt && (s.courier || s.trackingId) ? `<div style="margin-top:6px;font-size:12px;color:#555;">Courier: <strong>${s.courier || '—'}</strong> &nbsp;·&nbsp; Tracking ID: <strong>${s.trackingId || '—'}</strong></div>` : ''}
              <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
                <span style="font-size:13px;color:#888;cursor:pointer;text-decoration:underline;text-underline-offset:3px;" onclick="state.expandedCards['${cardKey}'] = !state.expandedCards['${cardKey}']; render();">
                  ${isExpanded ? 'Hide Details ▲' : 'View Details ▼'}
                </span>
                <button onclick="handleCancelApplication('${s.caId}', '${(s.creatorName || '').replace(/'/g, "\\'")} × ${(s.shopName || '').replace(/'/g, "\\'")} — ${formatDate(s.date)}')" style="background:none;border:1px solid #e74c3c;border-radius:6px;padding:5px 12px;font-size:12px;color:#e74c3c;cursor:pointer;font-weight:500;">
                  Cancel
                </button>
              </div>
              ${isExpanded ? `
                <div style="margin-top:12px;padding:12px;background:#fff8f0;border-radius:8px;border:1px solid #fcddd4;">
                  <div style="font-size:12px;font-weight:700;color:#e67e22;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Brand Application</div>
                  <div class="app-card-detail-grid">
                    <div class="app-card-detail"><div class="label">Stream Location</div><div class="value">${s.streamLocation || '—'}</div></div>
                    ${(String(s.sellerSiteRequired) === 'true' || s.streamLocation === 'Seller Site') ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Seller Site Address</div><div class="value">${s.sellerSiteAddress ? s.sellerSiteAddress + (s.sellerSitePostalCode ? ', S' +s.sellerSitePostalCode : '') : '—'}</div></div>` : ''}
                    <div class="app-card-detail"><div class="label">AMS Commission</div><div class="value">${s.amsCommission ? s.amsCommission + '%' : '—'}</div></div>
                    <div class="app-card-detail"><div class="label">Products Sponsored/Loaned</div><div class="value">${s.numProductsSponsored || '—'}</div></div>
                      <div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Voucher Tier</div><div class="value">${getVoucherTierLabel(s.voucherTier)}</div></div>
                    <div class="app-card-detail"><div class="label">Brand Activation</div><div class="value">${String(s.hasPackageActivation) === 'true' ? 'Yes' : 'No'}</div></div>
                    ${String(s.hasPackageActivation) === 'true' ? `<div class="app-card-detail"><div class="label">Brand Activation Type</div><div class="value">${getBrandActivationLabel(s.brandActivationType)}</div></div>` : ''}
                    <div class="app-card-detail"><div class="label">Preferred Date</div><div class="value">${s.preferredDate ? formatDate(s.preferredDate) : '—'}</div></div>
                    <div class="app-card-detail"><div class="label">Seller PIC</div><div class="value">${s.sellerPicName || '—'}${s.sellerPicMobile ? ' · ' + s.sellerPicMobile : ''}</div></div>
                    <div class="app-card-detail"><div class="label">Seller PIC Email</div><div class="value">${s.sellerPicEmail || '—'}</div></div>
                    ${s.livestreamBrief ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Livestream Brief</div><div class="value"><a href="${s.livestreamBrief}" target="_blank" style="color:#6c5ce7;text-decoration:underline;">View Brief</a></div></div>` : ''}
                  </div>
                </div>
                <div style="margin-top:8px;padding:12px;background:#f0faf4;border-radius:8px;border:1px solid #c3e6cb;">
                  <div style="font-size:12px;font-weight:700;color:#27ae60;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Creator Application</div>
                  <div class="app-card-detail-grid">
                    <div class="app-card-detail"><div class="label">Creator Telegram</div><div class="value">${s.telegram || '—'}</div></div>
                    <div class="app-card-detail"><div class="label">Creator Mobile</div><div class="value">${s.phone || '—'}</div></div>
                    ${s.shippingRecipientName ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Shipping Recipient Name</div><div class="value">${s.shippingRecipientName}</div></div>` : ''}
                    <div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Creator Shipping Address</div><div class="value">${s.shippingAddress ? s.shippingAddress + (s.shippingPostalCode ? ', S' +s.shippingPostalCode : '') : '—'}</div></div>
                    ${s.deliveryInstructions ? `<div class="app-card-detail" style="grid-column:1/-1;"><div class="label">Delivery Instructions</div><div class="value">${s.deliveryInstructions}</div></div>` : ''}
                  </div>
                </div>
              ` : ''}
            </div>
          `}).join('')}
        `}
      `;
    };

    // Internal: Calendar
    const renderInternalCalendar = () => {
      const year = state.calendarYear;
      const month = state.calendarMonth;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      // Build calendar events from creator applications (no display window filter — calendar has its own navigation)
      const activeStatuses = Object.entries(state.internalCalendarStatusFilter).filter(([, v]) => v).map(([k]) => k);
      const calendarEvents = []; // { date, time, creatorName, brandName, status }
      state.creatorApplications
        .filter(ca => activeStatuses.includes(ca.status))
        .forEach(ca => {
          const slots = getTimeslots(ca);
          slots.forEach(slot => {
            calendarEvents.push({
              caId: ca.id,
              date: slot.date,
              startTime: slot.startTime || slot.time,
              endTime: slot.endTime || '',
              creatorName: ca.creatorName,
              brandName: ca.brandName || ca.shopName,
              status: ca.status
            });
          });
        });

      const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      let cells = '';
      // Empty cells before first day
      for (let i = 0; i < firstDay; i++) {
        cells += '<div class="calendar-day empty"></div>';
      }
      // Day cells
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const daySlots = calendarEvents.filter(e => e.date === dateStr);
        const eventsHtml = daySlots.map(e =>
          `<div class="calendar-event ${e.status}" onclick="state.calendarModal={caId:'${e.caId}',date:'${e.date}',startTime:'${e.startTime}',endTime:'${e.endTime}'}; render();">${e.creatorName} → ${e.brandName}${e.startTime ? ' ' + formatTime(e.startTime) : ''}${e.endTime ? '–' + formatTime(e.endTime) : ''}</div>`
        ).join('');

        cells += `
          <div class="calendar-day">
            <div class="calendar-day-num">${day}</div>
            ${eventsHtml}
          </div>
        `;
      }

      return `
        <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
          <button class="btn-secondary" style="padding:8px 16px;" onclick="
            state.calendarMonth--;
            if(state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear--; }
            render();
          ">← Prev</button>
          <h3 style="font-size:18px;">${monthName}</h3>
          <button class="btn-secondary" style="padding:8px 16px;" onclick="
            state.calendarMonth++;
            if(state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear++; }
            render();
          ">Next →</button>
        </div>
        <div style="display:flex;gap:20px;margin-bottom:12px;flex-wrap:wrap;align-items:center;padding:12px 16px;background:#f9f9f9;border-radius:8px;">
          <span style="font-size:12px;font-weight:600;color:#555;">Show:</span>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;">
            <input type="checkbox" ${state.internalCalendarStatusFilter.approved ? 'checked' : ''}
              onchange="state.internalCalendarStatusFilter.approved = this.checked; render();"
              style="accent-color:#1976d2;width:16px;height:16px;">
            Approved
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;">
            <input type="checkbox" ${state.internalCalendarStatusFilter.pending ? 'checked' : ''}
              onchange="state.internalCalendarStatusFilter.pending = this.checked; render();"
              style="accent-color:#e67e22;width:16px;height:16px;">
            Pending Approval
          </label>
        </div>
        <div class="calendar-month">
          ${dayHeaders.map(d => `<div class="calendar-day-header">${d}</div>`).join('')}
          ${cells}
        </div>
      `;
    };

    // Initialize — restore session on refresh, otherwise show landing
    const _savedSession = sessionStorage.getItem('lbSession');
    if (_savedSession) {
      try {
        const _s = JSON.parse(_savedSession);
        if (_s.currentUser) {
          state.currentUser = _s.currentUser;
          state.view = _s.view || (_s.currentUser.type === 'brand' ? 'brand' : _s.currentUser.type === 'creator' ? 'creator' : 'internal');
          if (_s.creatorTab && _s.creatorTab !== 'pending-confirmation') state.creatorTab = _s.creatorTab;
          if (_s.brandTab) state.brandTab = _s.brandTab;
          if (_s.internalTab) state.internalTab = _s.internalTab;
          loadAllData(0);
        } else {
          render();
        }
      } catch (e) {
        render();
      }
    } else {
      render();
    }
  </script>
</body>
</html>
